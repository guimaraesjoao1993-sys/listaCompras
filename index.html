<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Compras Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .ios-scroll { -webkit-overflow-scrolling: touch; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            const [aba, setAba] = useState('preparo');
            
            // LISTA INICIAL DE CATEGORIAS
            const [categorias, setCategorias] = useState([
                'Seminaristas', 'Geral', 'Diversos', 'Hortifruti', 'Frutas', 'Carnes', 'Frios'
            ]);

            // SEU BANCO DE DADOS DE PRODUTOS
            const [inventario, setInventario] = useState([
                // Seminaristas
                {id: 1, nome: 'Achocolatado', cat: 'Seminaristas'}, {id: 2, nome: 'Acendedor', cat: 'Seminaristas'},
                {id: 3, nome: 'Adoçante', cat: 'Seminaristas'}, {id: 4, nome: 'Aveia', cat: 'Seminaristas'},
                {id: 5, nome: 'Barrinha de Cereal', cat: 'Seminaristas'}, {id: 6, nome: 'Biscoito Club Social', cat: 'Seminaristas'},
                {id: 7, nome: 'Café', cat: 'Seminaristas'}, {id: 8, nome: 'Leite Normal', cat: 'Seminaristas'},
                {id: 9, nome: 'Nescau Ball', cat: 'Seminaristas'}, {id: 10, nome: 'Refrigerante Coca-Cola', cat: 'Seminaristas'},
                // Geral
                {id: 11, nome: 'Açúcar Cristal', cat: 'Geral'}, {id: 12, nome: 'Arroz', cat: 'Geral'},
                {id: 13, nome: 'Feijão', cat: 'Geral'}, {id: 14, nome: 'Óleo de soja', cat: 'Geral'},
                {id: 15, nome: 'Macarrão espaguete', cat: 'Geral'}, {id: 16, nome: 'Sal', cat: 'Geral'},
                // Hortifruti
                {id: 17, nome: 'Alho', cat: 'Hortifruti'}, {id: 18, nome: 'Batata', cat: 'Hortifruti'},
                {id: 19, nome: 'Cebola', cat: 'Hortifruti'}, {id: 20, nome: 'Tomate', cat: 'Hortifruti'},
                // Carnes
                {id: 21, nome: 'Carne Moída', cat: 'Carnes'}, {id: 22, nome: 'Frango (Peito)', cat: 'Carnes'},
                // Frios
                {id: 23, nome: 'Mussarela', cat: 'Frios'}, {id: 24, nome: 'Ovos (Cartela)', cat: 'Frios'}
                // NOTA: Para brevidade no código, adicionei os principais. 
                // Você pode adicionar o resto da sua lista manualmente no botão "Cadastrar" ou via código aqui.
            ]);

            const [listaCompra, setListaCompra] = useState([]);
            const [novaCat, setNovaCat] = useState('');
            const [busca, setBusca] = useState('');

            // Lógica de Filtro
            const inventarioFiltrado = useMemo(() => {
                return inventario.filter(i => i.nome.toLowerCase().includes(busca.toLowerCase()));
            }, [busca, inventario]);

            // Funções
            const toggleNaLista = (prod) => {
                const existe = listaCompra.find(item => item.id === prod.id);
                if (existe) {
                    setListaCompra(listaCompra.filter(item => item.id !== prod.id));
                } else {
                    setListaCompra([...listaCompra, { ...prod, qtd: 1, comprado: false }]);
                }
            };

            const alterarQtd = (id, valor) => {
                setListaCompra(listaCompra.map(i => {
                    if (i.id === id) {
                        const novaQtd = Math.max(1, i.qtd + valor);
                        return { ...i, qtd: novaQtd };
                    }
                    return i;
                }));
            };

            const toggleComprado = (id) => {
                setListaCompra(listaCompra.map(i => i.id === id ? {...i, comprado: !i.comprado} : i));
            };

            const addCategoria = () => {
                if(novaCat && !categorias.includes(novaCat)) {
                    setCategorias([...categorias, novaCat]);
                    setNovaCat('');
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 flex flex-col shadow-2xl overflow-hidden">
                    {/* Header Fixo */}
                    <header className="bg-indigo-700 text-white p-5 pt-8 shadow-lg text-center">
                        <h1 className="text-xl font-black tracking-tighter">LISTA DA CASA 🏠</h1>
                    </header>

                    {/* Navegação */}
                    <nav className="flex bg-indigo-600 text-white font-bold text-[10px] uppercase tracking-widest">
                        <button onClick={() => setAba('geral')} className={`flex-1 py-4 transition ${aba==='geral'?'bg-indigo-900 border-b-4 border-yellow-400':'opacity-70'}`}>Estoque</button>
                        <button onClick={() => setAba('preparo')} className={`flex-1 py-4 transition ${aba==='preparo'?'bg-indigo-900 border-b-4 border-yellow-400':'opacity-70'}`}>Planejar</button>
                        <button onClick={() => setAba('compras')} className={`flex-1 py-4 transition ${aba==='compras'?'bg-indigo-900 border-b-4 border-yellow-400':'opacity-70'}`}>🛒 Mercado</button>
                    </nav>

                    {/* Conteúdo */}
                    <main className="flex-1 p-4 overflow-y-auto ios-scroll">
                        
                        {/* BUSCA (Aparece em Planejar e Estoque) */}
                        {aba !== 'compras' && (
                            <input 
                                type="text" 
                                placeholder="🔍 Buscar produto..." 
                                className="w-full p-3 mb-4 rounded-xl border-none shadow-inner bg-white"
                                value={busca}
                                onChange={e => setBusca(e.target.value)}
                            />
                        )}

                        {/* ABA 1: GERENCIAR ESTOQUE/CATEGORIAS */}
                        {aba === 'geral' && (
                            <div className="space-y-6">
                                <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                                    <h3 className="text-xs font-bold text-slate-400 uppercase mb-3">Nova Categoria</h3>
                                    <div className="flex gap-2">
                                        <input value={novaCat} onChange={e => setNovaCat(e.target.value)} className="flex-1 bg-slate-100 p-2 rounded-lg outline-none" placeholder="Ex: Higiene" />
                                        <button onClick={addCategoria} className="bg-indigo-600 text-white px-4 rounded-lg font-bold">+</button>
                                    </div>
                                </div>
                                <div className="space-y-1">
                                    <h3 className="text-xs font-bold text-slate-400 uppercase mb-3 px-1">Itens Cadastrados ({inventario.length})</h3>
                                    {inventarioFiltrado.map(i => (
                                        <div key={i.id} className="flex justify-between bg-white p-3 rounded-lg text-sm border-b border-slate-100">
                                            <span className="font-medium">{i.nome}</span>
                                            <span className="text-[10px] bg-slate-100 px-2 py-1 rounded font-bold text-slate-500 uppercase">{i.cat}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* ABA 2: PLANEJAR COMPRA */}
                        {aba === 'preparo' && (
                            <div className="space-y-4">
                                {categorias.map(cat => {
                                    const itensDaCat = inventarioFiltrado.filter(p => p.cat === cat);
                                    if(itensDaCat.length === 0) return null;
                                    return (
                                        <div key={cat} className="space-y-2">
                                            <h4 className="text-xs font-black text-indigo-400 uppercase tracking-widest pl-1 mt-4">{cat}</h4>
                                            {itensDaCat.map(i => {
                                                const itemNaLista = listaCompra.find(lc => lc.id === i.id);
                                                return (
                                                    <div key={i.id} className={`flex items-center justify-between p-3 rounded-xl border transition ${itemNaLista ? 'bg-indigo-50 border-indigo-200 shadow-sm' : 'bg-white border-slate-100'}`}>
                                                        <label className="flex items-center gap-3 cursor-pointer flex-1">
                                                            <input type="checkbox" checked={!!itemNaLista} onChange={() => toggleNaLista(i)} className="w-5 h-5 rounded-full accent-indigo-600" />
                                                            <span className={`text-sm ${itemNaLista ? 'font-bold text-indigo-900' : 'text-slate-600'}`}>{i.nome}</span>
                                                        </label>
                                                        {itemNaLista && (
                                                            <div className="flex items-center gap-3 bg-white px-2 py-1 rounded-lg shadow-sm border border-indigo-100">
                                                                <button onClick={() => alterarQtd(i.id, -1)} className="text-indigo-600 font-black px-1">-</button>
                                                                <span className="font-bold text-sm min-w-[20px] text-center">{itemNaLista.qtd}</span>
                                                                <button onClick={() => alterarQtd(i.id, 1)} className="text-indigo-600 font-black px-1">+</button>
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {/* ABA 3: MERCADO (CHECKOUT) */}
                        {aba === 'compras' && (
                            <div className="space-y-3">
                                <div className="flex justify-between items-end mb-6 bg-indigo-50 p-4 rounded-2xl border border-indigo-100">
                                    <div>
                                        <p className="text-[10px] font-bold text-indigo-400 uppercase">Status da Compra</p>
                                        <p className="text-2xl font-black text-indigo-900">{listaCompra.filter(i => i.comprado).length} / {listaCompra.length}</p>
                                    </div>
                                    <div className="w-24 bg-slate-200 h-2 rounded-full overflow-hidden">
                                        <div className="bg-indigo-600 h-full transition-all" style={{width: `${(listaCompra.filter(i => i.comprado).length / (listaCompra.length || 1)) * 100}%`}}></div>
                                    </div>
                                </div>
                                
                                {listaCompra.sort((a,b) => a.cat.localeCompare(b.cat)).map(i => (
                                    <div key={i.id} onClick={() => toggleComprado(i.id)} 
                                        className={`p-4 rounded-2xl border-2 flex justify-between items-center transition-all duration-300 ${i.comprado ? 'bg-slate-100 border-transparent grayscale opacity-50' : 'bg-white border-white shadow-md active:scale-95'}`}>
                                        <div className="flex items-center gap-4">
                                            <div className={`text-2xl`}>{i.comprado ? '✅' : '⬜'}</div>
                                            <div>
                                                <span className="text-[9px] font-black text-indigo-500 uppercase tracking-tighter">{i.cat}</span>
                                                <p className={`text-lg leading-tight font-bold ${i.comprado ? 'line-through text-slate-500' : 'text-slate-800'}`}>{i.nome}</p>
                                            </div>
                                        </div>
                                        <div className="bg-indigo-50 px-3 py-1 rounded-lg text-center">
                                            <span className="block text-[8px] font-bold text-indigo-400 uppercase italic">Qtd</span>
                                            <span className="text-lg font-black text-indigo-700">{i.qtd}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
