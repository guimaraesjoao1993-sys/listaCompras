<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista da Casa PRO - Estável</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyD4jdw3dkSl-63iyBypdip4NXUah2mdie8",
            authDomain: "rag-final-474711.firebaseapp.com",
            databaseURL: "https://rag-final-474711-default-rtdb.firebaseio.com",
            projectId: "rag-final-474711",
            storageBucket: "rag-final-474711.firebasestorage.app",
            messagingSenderId: "281529599553",
            appId: "1:281529599553:web:2e466ab204c1dc7210a8c0"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function App() {
            const [aba, setAba] = useState('preparo');
            const [listaCompra, setListaCompra] = useState({});
            const [inventario, setInventario] = useState([]);
            const [busca, setBusca] = useState("");
            const [qtd, setQtd] = useState("");
            const [obs, setObs] = useState("");
            const [filtroEdit, setFiltroEdit] = useState("");

            useEffect(() => {
                db.ref('inventario_mestre').on('value', snap => {
                    const val = snap.val() || {};
                    setInventario(Object.entries(val).map(([id, v]) => ({ id, ...v })));
                });
                db.ref('compra_atual').on('value', snap => setListaCompra(snap.val() || {}));
            }, []);

            // OTIMIZAÇÃO DE BUSCA: Só filtra se houver 2 ou mais letras
            const sugestoes = useMemo(() => {
                const b = busca.trim().toLowerCase();
                if (b.length < 2) return [];
                return inventario.filter(i => i.nome.toLowerCase().includes(b)).slice(0, 5);
            }, [busca, inventario]);

            // OTIMIZAÇÃO DO BANCO: Lista limitada para não travar
            const listaEdit = useMemo(() => {
                const f = filtroEdit.trim().toLowerCase();
                if (!f) return inventario.slice(0, 15);
                return inventario.filter(i => i.nome.toLowerCase().includes(f)).slice(0, 20);
            }, [filtroEdit, inventario]);

            const salvarNaLista = (nome, cat) => {
                const id = btoa(unescape(encodeURIComponent(nome))).replace(/=/g, "");
                db.ref(`compra_atual/${id}`).set({
                    nome, cat: cat || "Geral", qtd: qtd || "1", obs: obs || "", comprado: false
                }).then(() => { setBusca(""); setQtd(""); setObs(""); });
            };

            const itensAgrupados = Object.values(listaCompra).reduce((acc, item) => {
                if (!acc[item.cat]) acc[item.cat] = [];
                acc[item.cat].push(item);
                return acc;
            }, {});

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white flex flex-col shadow-2xl">
                    <nav className="flex bg-indigo-700 text-white font-bold text-[10px] uppercase sticky top-0 z-50">
                        <button onClick={() => setAba('preparo')} className={`flex-1 py-4 ${aba==='preparo'?'bg-indigo-900 border-b-4 border-yellow-400':''}`}>1. Planejar</button>
                        <button onClick={() => setAba('compras')} className={`flex-1 py-4 ${aba==='compras'?'bg-indigo-900 border-b-4 border-yellow-400':''}`}>2. Mercado</button>
                        <button onClick={() => setAba('editar')} className={`flex-1 py-4 ${aba==='editar'?'bg-indigo-900 border-b-4 border-yellow-400':''}`}>3. Banco</button>
                    </nav>

                    <main className="p-4 flex-1 overflow-y-auto pb-20">
                        {aba === 'preparo' && (
                            <div className="space-y-4">
                                <div className="bg-slate-50 p-4 rounded-3xl border border-indigo-100 shadow-inner">
                                    <input value={busca} onChange={e => setBusca(e.target.value)} placeholder="🔍 Digite o produto..." className="w-full p-3 rounded-xl mb-1 outline-none font-bold" />
                                    <div className="space-y-1 mb-2">
                                        {sugestoes.map(s => (
                                            <div key={s.id} onClick={() => {setBusca(s.nome); setQtd("1");}} className="p-3 bg-white border rounded-lg text-xs flex justify-between cursor-pointer active:bg-indigo-50">
                                                <span className="font-bold">{s.nome}</span> <span className="opacity-40">{s.cat}</span>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="flex gap-2">
                                        <input value={qtd} onChange={e => setQtd(e.target.value)} placeholder="Qtd" className="w-20 p-2 rounded-lg outline-none font-bold" />
                                        <input value={obs} onChange={e => setObs(e.target.value)} placeholder="Observação..." className="flex-1 p-2 rounded-lg outline-none italic text-xs" />
                                    </div>
                                    <button onClick={() => salvarNaLista(busca, "Geral")} className="w-full mt-3 bg-indigo-600 text-white font-bold py-3 rounded-xl uppercase text-[10px]">Adicionar</button>
                                </div>
                                <div className="space-y-2">
                                    {Object.entries(listaCompra).map(([id, item]) => (
                                        <div key={id} className="p-3 bg-white border-b flex justify-between items-center text-xs">
                                            <span className="font-bold uppercase">{item.nome} ({item.qtd})</span>
                                            <button onClick={() => db.ref(`compra_atual/${id}`).remove()} className="text-red-400 p-2 text-lg">✕</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {aba === 'compras' && (
                            <div className="space-y-6">
                                {Object.keys(itensAgrupados).sort().map(cat => (
                                    <div key={cat} className="space-y-2">
                                        <h3 className="text-[10px] font-black text-indigo-400 uppercase text-center border-b pb-1 tracking-widest">{cat}</h3>
                                        {itensAgrupados[cat].map(item => (
                                            <div key={item.nome} onClick={() => {
                                                const id = btoa(unescape(encodeURIComponent(item.nome))).replace(/=/g, "");
                                                db.ref(`compra_atual/${id}`).update({comprado: !item.comprado});
                                            }} className={`p-4 rounded-xl flex justify-between items-center ${item.comprado ? 'bg-gray-50 opacity-40 grayscale shadow-none' : 'bg-white shadow border border-slate-100'}`}>
                                                <div className="flex gap-4 items-center">
                                                    <div className="text-xl">{item.comprado ? '✅' : '⬜'}</div>
                                                    <div>
                                                        <span className={`text-base font-bold ${item.comprado ? 'line-through text-gray-400' : 'text-gray-800'}`}>{item.nome}</span>
                                                        {item.obs && !item.comprado && <p className="text-[10px] text-indigo-500 italic">{item.obs}</p>}
                                                    </div>
                                                </div>
                                                <div className="bg-indigo-700 text-white px-2 py-1 rounded font-bold text-[10px]">{item.qtd}</div>
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        )}

                        {aba === 'editar' && (
                            <div className="space-y-4">
                                <input value={filtroEdit} onChange={e => setFiltroEdit(e.target.value)} placeholder="🔍 Pesquisar no banco..." className="w-full p-3 rounded-lg border-2 outline-none font-bold" />
                                {listaEdit.map(item => (
                                    <div key={item.id} className="p-3 bg-white border rounded-xl shadow-sm flex flex-col gap-2">
                                        <div className="flex gap-2">
                                            <input defaultValue={item.nome} onBlur={e => db.ref(`inventario_mestre/${item.id}`).update({nome: e.target.value})} className="font-bold text-sm bg-gray-50 p-1 rounded flex-1 mr-2" />
                                            <button onClick={() => confirm("Excluir?") && db.ref(`inventario_mestre/${item.id}`).remove()} className="text-red-400">✕</button>
                                        </div>
                                        <select defaultValue={item.cat} onChange={e => db.ref(`inventario_mestre/${item.id}`).update({cat: e.target.value})} className="text-[9px] uppercase font-bold text-gray-400 bg-gray-100 p-1 rounded w-full">
                                            <option value="Geral">Geral</option><option value="Seminaristas">Seminaristas</option><option value="Hortifruti">Hortifruti</option><option value="Carnes">Carnes</option><option value="Diversos">Diversos</option><option value="Frios">Frios</option><option value="Frutas">Frutas</option>
                                        </select>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
