<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista da Casa PRO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyD4jdw3dkSl-63iyBypdip4NXUah2mdie8",
            authDomain: "rag-final-474711.firebaseapp.com",
            databaseURL: "https://rag-final-474711-default-rtdb.firebaseio.com",
            projectId: "rag-final-474711",
            storageBucket: "rag-final-474711.firebasestorage.app",
            messagingSenderId: "281529599553",
            appId: "1:281529599553:web:2e466ab204c1dc7210a8c0"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function App() {
            const [aba, setAba] = useState('preparo');
            const [listaCompra, setListaCompra] = useState({});
            const [inventario, setInventario] = useState([]);
            const [busca, setBusca] = useState("");
            const [qtd, setQtd] = useState("");
            const [obs, setObs] = useState("");
            const [sugestoes, setSugestoes] = useState([]);
            const [filtroEdit, setFiltroEdit] = useState("");

            useEffect(() => {
                db.ref('inventario_mestre').on('value', snap => {
                    const val = snap.val() || {};
                    setInventario(Object.entries(val).map(([id, v]) => ({ id, ...v })));
                });
                db.ref('compra_atual').on('value', snap => setListaCompra(snap.val() || {}));
            }, []);

            const adicionarItem = (itemBase) => {
                const nomeFinal = itemBase ? itemBase.nome : busca;
                const catFinal = itemBase ? itemBase.cat : "Geral";
                const idSeguro = btoa(unescape(encodeURIComponent(nomeFinal))).replace(/=/g, "");
                
                db.ref(`compra_atual/${idSeguro}`).set({
                    nome: nomeFinal,
                    cat: catFinal,
                    qtd: qtd || "1",
                    obs: obs || "",
                    comprado: false
                }).then(() => {
                    setBusca(""); setQtd(""); setObs(""); setSugestoes([]);
                });
            };

            const atualizarProdutoMestre = (id, novoNome, novaCat) => {
                db.ref(`inventario_mestre/${id}`).update({ nome: novoNome, cat: novaCat });
            };

            const excluirDoMestre = (id) => {
                if(confirm("Excluir este produto permanentemente do banco?")) {
                    db.ref(`inventario_mestre/${id}`).remove();
                }
            };

            const itensAgrupados = Object.values(listaCompra).reduce((acc, item) => {
                if (!acc[item.cat]) acc[item.cat] = [];
                acc[item.cat].push(item);
                return acc;
            }, {});

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white flex flex-col shadow-2xl">
                    <nav className="flex bg-indigo-700 text-white font-bold text-[10px] uppercase sticky top-0 z-50">
                        <button onClick={() => setAba('preparo')} className={`flex-1 py-4 ${aba==='preparo'?'bg-indigo-900 border-b-4 border-yellow-400':''}`}>Planejar</button>
                        <button onClick={() => setAba('compras')} className={`flex-1 py-4 ${aba==='compras'?'bg-indigo-900 border-b-4 border-yellow-400':''}`}>Mercado</button>
                        <button onClick={() => setAba('editar')} className={`flex-1 py-4 ${aba==='editar'?'bg-indigo-900 border-b-4 border-yellow-400':''}`}>Editar Banco</button>
                    </nav>

                    <main className="p-4 flex-1 overflow-y-auto pb-24">
                        {aba === 'preparo' && (
                            <div className="space-y-4">
                                <div className="bg-indigo-50 p-4 rounded-3xl border-2 border-indigo-100 shadow-inner">
                                    <input 
                                        value={busca} 
                                        onChange={(e) => {
                                            setBusca(e.target.value);
                                            const filtrados = inventario.filter(i => i.nome.toLowerCase().includes(e.target.value.toLowerCase())).slice(0, 5);
                                            setSugestoes(e.target.value ? filtrados : []);
                                        }} 
                                        placeholder="🔍 Nome do produto..." 
                                        className="w-full p-3 rounded-xl mb-2 border-none outline-none font-bold shadow-sm" 
                                    />
                                    {sugestoes.map(s => (
                                        <div key={s.id} onClick={() => { setBusca(s.nome); setSugestoes([]); }} className="p-3 bg-white mb-1 rounded-lg border text-sm flex justify-between cursor-pointer active:bg-indigo-100">
                                            <span className="font-bold">{s.nome}</span> <span className="text-[10px] text-slate-400 uppercase">{s.cat}</span>
                                        </div>
                                    ))}
                                    <div className="flex gap-2">
                                        <input value={qtd} onChange={e => setQtd(e.target.value)} placeholder="Qtd" className="w-1/3 p-3 rounded-xl outline-none font-bold shadow-sm" />
                                        <input value={obs} onChange={e => setObs(e.target.value)} placeholder="Obs: Marca, tipo..." className="w-2/3 p-3 rounded-xl outline-none italic text-sm shadow-sm" />
                                    </div>
                                    <button onClick={() => adicionarItem()} className="w-full mt-3 bg-indigo-600 text-white font-black py-4 rounded-2xl uppercase text-xs shadow-lg active:scale-95 transition-transform">Adicionar à Lista</button>
                                </div>

                                <div className="space-y-2">
                                    <h3 className="text-[10px] font-black text-slate-400 uppercase ml-2">Lista de Compras Atual</h3>
                                    {Object.entries(listaCompra).map(([id, item]) => (
                                        <div key={id} className="p-3 bg-white border-b-2 border-slate-100 flex justify-between items-center">
                                            <div>
                                                <p className="font-black text-slate-700 text-sm uppercase">{item.nome} ({item.qtd})</p>
                                                {item.obs && <p className="text-[11px] text-indigo-500 italic font-medium">{item.obs}</p>}
                                            </div>
                                            <button onClick={() => db.ref(`compra_atual/${id}`).remove()} className="text-red-400 p-2 text-xl">✕</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {aba === 'compras' && (
                            <div className="space-y-6">
                                <button onClick={() => confirm("Zerar lista?") && db.ref('compra_atual').remove()} className="w-full bg-red-50 text-red-600 p-2 rounded-xl text-[10px] font-black uppercase">Limpar Tudo</button>
                                {Object.keys(itensAgrupados).sort().map(cat => (
                                    <div key={cat} className="space-y-2">
                                        <h3 className="text-[10px] font-black text-indigo-300 uppercase text-center border-b pb-1">{cat}</h3>
                                        {itensAgrupados[cat].map(item => {
                                            const idKey = btoa(unescape(encodeURIComponent(item.nome))).replace(/=/g, "");
                                            return (
                                                <div key={idKey} onClick={() => db.ref(`compra_atual/${idKey}`).update({comprado: !item.comprado})} 
                                                     className={`p-4 rounded-2xl flex justify-between items-center ${item.comprado ? 'bg-slate-50 opacity-40 grayscale shadow-none' : 'bg-white shadow-md border border-slate-100'}`}>
                                                    <div className="flex gap-4 items-center">
                                                        <div className="text-2xl">{item.comprado ? '✅' : '⬜'}</div>
                                                        <div>
                                                            <span className={`text-lg font-black leading-tight ${item.comprado ? 'line-through text-slate-400' : 'text-slate-800'}`}>{item.nome}</span>
                                                            {item.obs && !item.comprado && <p className="text-[10px] text-indigo-500 italic">{item.obs}</p>}
                                                        </div>
                                                    </div>
                                                    <div className="bg-indigo-700 text-white px-3 py-1 rounded-lg font-black text-xs">{item.qtd}</div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                ))}
                            </div>
                        )}

                        {aba === 'editar' && (
                            <div className="space-y-4">
                                <div className="bg-yellow-50 p-4 rounded-xl border border-yellow-200 text-[11px] text-yellow-700 mb-4">
                                    <strong>Cuidado:</strong> As alterações aqui mudam o nome do produto no banco de dados mestre para sempre.
                                </div>
                                <input 
                                    value={filtroEdit} 
                                    onChange={e => setFiltroEdit(e.target.value)} 
                                    placeholder="🔍 Filtrar produto para editar..." 
                                    className="w-full p-3 rounded-xl border outline-none font-bold mb-4"
                                />
                                {inventario.filter(i => i.nome.toLowerCase().includes(filtroEdit.toLowerCase())).slice(0, 20).map(item => (
                                    <div key={item.id} className="p-4 bg-white border rounded-2xl shadow-sm space-y-2">
                                        <div className="flex gap-2">
                                            <input 
                                                defaultValue={item.nome} 
                                                onBlur={(e) => atualizarProdutoMestre(item.id, e.target.value, item.cat)}
                                                className="flex-1 font-bold text-sm p-2 bg-slate-50 rounded"
                                            />
                                            <button onClick={() => excluirDoMestre(item.id)} className="text-red-400 px-2 font-bold">Excluir</button>
                                        </div>
                                        <select 
                                            defaultValue={item.cat} 
                                            onChange={(e) => atualizarProdutoMestre(item.id, item.nome, e.target.value)}
                                            className="w-full text-[10px] p-2 bg-slate-100 rounded uppercase font-bold text-slate-500"
                                        >
                                            <option value="Seminaristas">Seminaristas</option>
                                            <option value="Geral">Geral</option>
                                            <option value="Hortifruti">Hortifruti</option>
                                            <option value="Carnes">Carnes</option>
                                            <option value="Diversos">Diversos</option>
                                            <option value="Frios">Frios</option>
                                            <option value="Frutas">Frutas</option>
                                        </select>
                                    </div>
                                ))}
                                {inventario.length > 20 && <p className="text-center text-[10px] text-slate-400">Refine a busca para ver outros itens...</p>}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
