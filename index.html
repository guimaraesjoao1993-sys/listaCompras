            "Carnes": ["Bacon em pedaço", "Bacon em tiras", "Bisteca Suína", "Brócolis congelado", "Carne Assada", "Carne Bovina (Lagarto)", "Carne Moída", "Carne para Bife", "Carne para Estrogonofe", "Carne para Panela", "Carne Seca Dianteiro", "Copa Lombo Grelhado", "Costela", "Costelinha Suína", "Cupim", "Filé de Peito de Frango", "Filé de Peixe", "Filé Mignon Suíno", "Linguiça Calabresa", "Linguiça Calabresa Fininha", "Linguiça de Paio", "Linguiça Toscana", "Lombo de Porco Salgado", "Paio", "Peito de Frango", "Pernil Suíno sem osso", "Rabada", "Salmão", "Sobrecoxa de Frango", "coxão mole", "Torresmo"],
            "Frios": ["Anel de Cebola", "Hamburguer", "Iogurte", "Manteiga", "Mortadela", "Nuggets de Frango", "Pão de Queijo", "Pizza", "Presunto fatiado", "Queijo Meia Cura", "Queijo Minas Frescal", "Queijo Mussarela Fatiado", "Requeijão", "Sorvete", "Suco Natural", "Alho Descascado", "Banha", "Batata Frita", "Calabresa", "Catupiry", "Couve-Flor congelada", "Creme de Leite Fresco", "Massa de Pastel", "Nata", "Nhoque", "Parmesão Defumado", "Queijo Mussarela (peça)", "Rondelli", "Ovos (Cartela)"]
        };

        function App() {
            const [aba, setAba] = useState('preparo');
            const [listaCompra, setListaCompra] = useState({});
            const [inventario, setInventario] = useState([]);
            const [categorias, setCategorias] = useState([]);
            const [inputBusca, setInputBusca] = useState('');
            const [inputQtd, setInputQtd] = useState('');
            const [sugestoes, setSugestoes] = useState([]);
            const [loading, setLoading] = useState(true);
            const qtdRef = useRef(null);

            useEffect(() => {
                db.ref('compra_atual').on('value', s => setListaCompra(s.val() || {}));
                db.ref('categorias').on('value', s => setCategorias(s.val() || []));
                db.ref('inventario_mestre').on('value', s => {
                    const data = s.val() || {};
                    setInventario(Object.entries(data).map(([id, v]) => ({id, ...v})));
                    setLoading(false);
                });
            }, []);

            const resetarTudo = () => {
                if(confirm("Carregar todos os produtos agora?")) {
                    const cats = Object.keys(LISTA_INICIAL);
                    db.ref('categorias').set(cats);
                    const batch = {};
                    Object.entries(LISTA_INICIAL).forEach(([cat, itens]) => {
                        itens.forEach(nome => {
                            const id = btoa(unescape(encodeURIComponent(nome))).replace(/=/g, "");
                            batch[id] = { nome, cat };
                        });
                    });
                    db.ref('inventario_mestre').set(batch);
                    alert("Sucesso! Agora você já pode buscar os itens.");
                }
            };

            const handleBusca = (v) => {
                setInputBusca(v);
                setSugestoes(v.length > 0 ? inventario.filter(i => i.nome.toLowerCase().includes(v.toLowerCase())).slice(0, 5) : []);
            };

            const adicionar = () => {
                const item = inventario.find(i => i.nome.toLowerCase() === inputBusca.toLowerCase());
                if(item) {
                    db.ref(`compra_atual/${item.id}`).set({ ...item, qtd: inputQtd || "1", comprado: false });
                    setInputBusca(''); setInputQtd(''); setSugestoes([]);
                }
            };

            const itensAgrupados = Object.values(listaCompra).reduce((acc, item) => {
                if (!acc[item.cat]) acc[item.cat] = [];
                acc[item.cat].push(item);
                return acc;
            }, {});

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 flex flex-col shadow-2xl pb-20">
                    <nav className="flex bg-indigo-700 text-white font-bold text-[10px] sticky top-0 z-50 uppercase">
                        <button onClick={() => setAba('preparo')} className={`flex-1 py-4 ${aba==='preparo'?'bg-indigo-900 border-b-4 border-yellow-400':''}`}>Planejar</button>
                        <button onClick={() => setAba('compras')} className={`flex-1 py-4 ${aba==='compras'?'bg-indigo-900 border-b-4 border-yellow-400':''}`}>Mercado</button>
                        <button onClick={() => setAba('config')} className={`flex-1 py-4 ${aba==='config'?'bg-indigo-900 border-b-4 border-yellow-400':''}`}>⚙️ Config</button>
                    </nav>

                    <main className="p-4">
                        {aba === 'config' && (
                            <div className="text-center py-10">
                                <h2 className="font-bold mb-4">Configuração Inicial</h2>
                                <button onClick={resetarTudo} className="bg-orange-500 text-white p-4 rounded-xl font-bold shadow-lg">CARREGAR LISTA DE PRODUTOS</button>
                                <p className="text-xs text-slate-400 mt-4 italic">Clique acima se a busca não estiver funcionando.</p>
                            </div>
                        )}

                        {aba === 'preparo' && (
                            <div className="space-y-4">
                                <div className="bg-indigo-600 p-4 rounded-2xl shadow-lg">
                                    <input value={inputBusca} onChange={e => handleBusca(e.target.value)} placeholder="Buscar produto..." className="w-full p-3 rounded-xl mb-2 outline-none" />
                                    {sugestoes.length > 0 && (
                                        <div className="bg-white rounded-xl mb-2 overflow-hidden shadow-xl">
                                            {sugestoes.map(s => (
                                                <div key={s.id} onClick={() => {setInputBusca(s.nome); setSugestoes([]); qtdRef.current.focus();}} className="p-3 border-b text-sm flex justify-between">
                                                    <span className="font-bold">{s.nome}</span>
                                                    <span className="text-[10px] text-slate-400 uppercase">{s.cat}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                    <div className="flex gap-2">
                                        <input ref={qtdRef} value={inputQtd} onChange={e => setInputQtd(e.target.value)} onKeyDown={e => e.key==='Enter' && adicionar()} placeholder="Qtd..." className="flex-1 p-3 rounded-xl outline-none" />
                                        <button onClick={adicionar} className="bg-yellow-400 text-indigo-900 px-6 rounded-xl font-black uppercase">Add</button>
                                    </div>
                                </div>
                                <div className="space-y-2">
                                    {Object.entries(listaCompra).map(([id, item]) => (
                                        <div key={id} className="bg-white p-3 rounded-xl shadow-sm flex justify-between items-center border-l-4 border-indigo-400">
                                            <span><b className="text-indigo-600">[{item.qtd}]</b> {item.nome}</span>
                                            <button onClick={() => db.ref(`compra_atual/${id}`).remove()} className="text-red-400 font-bold p-1">✕</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {aba === 'compras' && (
                            <div className="space-y-6">
                                {Object.keys(itensAgrupados).sort().map(cat => (
                                    <div key={cat} className="space-y-2">
                                        <h3 className="text-[10px] font-black text-indigo-400 uppercase text-center tracking-widest">{cat}</h3>
                                        {itensAgrupados[cat].map(item => (
                                            <div key={item.id} onClick={() => db.ref(`compra_atual/${item.id}`).update({comprado: !item.comprado})} 
                                                 className={`p-4 rounded-2xl flex justify-between items-center transition-all ${item.comprado ? 'bg-slate-200 opacity-40' : 'bg-white shadow-md active:scale-95'}`}>
                                                <span className={`text-lg font-bold ${item.comprado ? 'line-through' : ''}`}>{item.nome}</span>
                                                <span className="bg-indigo-600 text-white px-3 py-1 rounded-lg text-xs">{item.qtd}</span>
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
