<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista da Casa PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyD4jdw3dkSl-63iyBypdip4NXUah2mdie8",
            authDomain: "rag-final-474711.firebaseapp.com",
            databaseURL: "https://rag-final-474711-default-rtdb.firebaseio.com/",
            projectId: "rag-final-474711",
            storageBucket: "rag-final-474711.firebasestorage.app",
            messagingSenderId: "281529599553",
            appId: "1:281529599553:web:2e466ab204c1dc7210a8c0",
            measurementId: "G-2JPNZNTGQQ"
        };

        // Inicialização Segura
        let db;
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            db = firebase.database();
        } catch (e) {
            console.error("Erro ao iniciar Firebase:", e);
        }

        const LISTA_BRUTA = {
            "Seminaristas": ["Achocolatado", "Acendedor", "Adoçante", "Aveia", "Barrinha de Cereal", "Biscoito Club Social", "Café", "Leite Normal", "Pão de Forma", "Refrigerante", "Suco"],
            "Geral": ["Açúcar", "Arroz", "Feijão", "Óleo", "Macarrão", "Sal", "Farinha", "Molho de Tomate", "Creme de Leite", "Leite Condensado"],
            "Hortifruti": ["Alho", "Cebola", "Batata", "Tomate", "Alface", "Cenoura", "Banana", "Laranja", "Limão"],
            "Carnes": ["Carne Moída", "Frango", "Bacon", "Linguiça", "Peixe"],
            "Diversos": ["Detergente", "Sabão em Pó", "Papel Higiênico", "Esponja", "Desinfetante"],
            "Frios": ["Mussarela", "Presunto", "Manteiga", "Iogurte", "Ovos"]
        };

        function App() {
            const [aba, setAba] = useState('config');
            const [inventario, setInventario] = useState([]);
            const [listaCompra, setListaCompra] = useState({});
            const [status, setStatus] = useState("Conectando...");
            const [busca, setBusca] = useState("");
            const [sugestoes, setSugestoes] = useState([]);
            const [qtd, setQtd] = useState("");
            const qtdRef = useRef();

            useEffect(() => {
                if (!db) {
                    setStatus("Erro: Database não configurado.");
                    return;
                }

                // Teste de conexão
                const connectedRef = db.ref(".info/connected");
                connectedRef.on("value", (snap) => {
                    if (snap.val() === true) {
                        setStatus("Conectado ✅");
                    } else {
                        setStatus("Desconectado ❌");
                    }
                });

                db.ref('inventario_mestre').on('value', snap => {
                    const data = snap.val() || {};
                    setInventario(Object.entries(data).map(([id, v]) => ({id, ...v})));
                });

                db.ref('compra_atual').on('value', snap => {
                    setListaCompra(snap.val() || {});
                });
            }, []);

            const importar = () => {
                setStatus("Enviando dados...");
                const batch = {};
                Object.entries(LISTA_BRUTA).forEach(([cat, itens]) => {
                    itens.forEach(nome => {
                        const id = btoa(unescape(encodeURIComponent(nome))).replace(/=/g, "");
                        batch[id] = { nome, cat };
                    });
                });
                db.ref('inventario_mestre').update(batch)
                  .then(() => alert("Lista enviada com sucesso!"))
                  .catch(err => alert("Erro ao enviar: " + err.message));
            };

            const handleBusca = (v) => {
                setBusca(v);
                setSugestoes(v.length > 0 ? inventario.filter(i => i.nome.toLowerCase().includes(v.toLowerCase())).slice(0, 5) : []);
            };

            const add = () => {
                const item = inventario.find(i => i.nome.toLowerCase() === busca.toLowerCase());
                if(item) {
                    db.ref(`compra_atual/${item.id}`).set({ ...item, qtd: qtd || "1", comprado: false });
                    setBusca(""); setQtd(""); setSugestoes([]);
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 flex flex-col shadow-xl pb-20">
                    <div className="bg-black text-[10px] text-white p-1 text-center font-mono">{status}</div>
                    
                    <nav className="flex bg-indigo-700 text-white font-bold text-[10px] uppercase sticky top-0 z-50">
                        <button onClick={() => setAba('preparo')} className={`flex-1 py-4 ${aba==='preparo'?'bg-indigo-900 border-b-4 border-yellow-400':''}`}>Planejar</button>
                        <button onClick={() => setAba('compras')} className={`flex-1 py-4 ${aba==='compras'?'bg-indigo-900 border-b-4 border-yellow-400':''}`}>Mercado</button>
                        <button onClick={() => setAba('config')} className={`flex-1 py-4 ${aba==='config'?'bg-indigo-900 border-b-4 border-yellow-400':''}`}>⚙️ Config</button>
                    </nav>

                    <main className="p-4">
                        {aba === 'config' && (
                            <div className="flex flex-col items-center py-20 gap-4">
                                <h2 className="font-bold text-center">Configuração do Sistema</h2>
                                <button onClick={importar} className="bg-orange-500 text-white p-6 rounded-2xl font-black shadow-xl animate-pulse">
                                    CLIQUE AQUI PARA CARREGAR PRODUTOS
                                </button>
                                <p className="text-xs text-slate-400 px-10 text-center uppercase font-bold tracking-tighter italic">
                                    Se a busca não funciona, este botão envia os produtos para a nuvem.
                                </p>
                            </div>
                        )}

                        {aba === 'preparo' && (
                            <div className="space-y-4">
                                <div className="bg-indigo-600 p-4 rounded-3xl shadow-lg">
                                    <input value={busca} onChange={e => handleBusca(e.target.value)} placeholder="🔍 Digite o nome do produto..." className="w-full p-4 rounded-2xl mb-2 outline-none shadow-inner" />
                                    {sugestoes.length > 0 && (
                                        <div className="bg-white rounded-2xl mb-2 shadow-2xl overflow-hidden">
                                            {sugestoes.map(s => (
                                                <div key={s.id} onClick={() => {setBusca(s.nome); setSugestoes([]); qtdRef.current.focus();}} className="p-4 border-b text-sm font-bold flex justify-between active:bg-indigo-100">
                                                    <span>{s.nome}</span>
                                                    <span className="text-[9px] bg-slate-100 px-2 py-1 rounded text-slate-400 uppercase">{s.cat}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                    <div className="flex gap-2">
                                        <input ref={qtdRef} value={qtd} onChange={e => setQtd(e.target.value)} onKeyDown={e => e.key==='Enter' && add()} placeholder="Quantidade (ex: 2kg)" className="flex-1 p-4 rounded-2xl outline-none" />
                                        <button onClick={add} className="bg-yellow-400 text-indigo-900 px-8 rounded-2xl font-black uppercase shadow-md">Add</button>
                                    </div>
                                </div>
                                <div className="space-y-2 pt-4">
                                    {Object.entries(listaCompra).map(([id, item]) => (
                                        <div key={id} className="bg-white p-4 rounded-2xl shadow-sm border-l-8 border-indigo-500 flex justify-between items-center">
                                            <span className="font-bold">{item.nome} <span className="text-indigo-400">({item.qtd})</span></span>
                                            <button onClick={() => db.ref(`compra_atual/${id}`).remove()} className="text-red-400 font-bold p-2">✕</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {aba === 'compras' && (
                            <div className="text-center py-20 text-slate-400 italic">
                                {Object.keys(listaCompra).length === 0 ? "Adicione itens na aba Planejar primeiro!" : "Itens prontos para o mercado."}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
