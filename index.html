<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Compras Colaborativo</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [aba, setAba] = useState('geral');
            
            // 1. Lista de produtos prévios e categorias
            const [categorias, setCategorias] = useState(['Hortifruti', 'Limpeza', 'Carnes', 'Padaria', 'Outros']);
            const [inventario, setInventario] = useState([
                { id: 1, nome: 'Arroz', cat: 'Outros' },
                { id: 2, nome: 'Feijão', cat: 'Outros' },
                { id: 3, nome: 'Detergente', cat: 'Limpeza' }
                // Você pode adicionar mais aqui ou usar o formulário do sistema
            ]);

            const [listaCompra, setListaCompra] = useState([]);
            const [novoItem, setNovoItem] = useState({ nome: '', cat: 'Outros' });
            const [novaCat, setNovaCat] = useState('');

            // Funções de Gerenciamento
            const addCategoria = () => {
                if(novaCat && !categorias.includes(novaCat)) {
                    setCategorias([...categorias, novaCat]);
                    setNovaCat('');
                }
            };

            const addInventario = () => {
                if(!novoItem.nome) return;
                setInventario([...inventario, { ...novoItem, id: Date.now() }]);
                setNovoItem({ ...novoItem, nome: '' });
            };

            const atualizarQtd = (id, delta) => {
                setListaCompra(prev => prev.map(item => {
                    if (item.id === id) {
                        const novaQtd = Math.max(1, item.qtd + delta);
                        return { ...item, qtd: novaQtd };
                    }
                    return item;
                }));
            };

            const toggleNaLista = (prod) => {
                const itemNaLista = listaCompra.find(i => i.id === prod.id);
                if (itemNaLista) {
                    setListaCompra(listaCompra.filter(i => i.id !== prod.id));
                } else {
                    setListaCompra([...listaCompra, { ...prod, qtd: 1, comprado: false }]);
                }
            };

            const checkItem = (id) => {
                setListaCompra(listaCompra.map(i => i.id === id ? {...i, comprado: !i.comprado} : i));
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white shadow-lg flex flex-col pb-20">
                    <header className="bg-emerald-600 text-white p-4 text-center font-bold shadow-md">
                        CARRINHO COMPARTILHADO
                    </header>
                    
                    <nav className="flex bg-emerald-500 text-white text-xs uppercase font-bold sticky top-0 z-10">
                        <button onClick={() => setAba('geral')} className={`flex-1 p-4 ${aba==='geral'?'bg-emerald-700':''}`}>1. Cadastrar</button>
                        <button onClick={() => setAba('preparo')} className={`flex-1 p-4 ${aba==='preparo'?'bg-emerald-700':''}`}>2. Planejar</button>
                        <button onClick={() => setAba('compras')} className={`flex-1 p-4 ${aba==='compras'?'bg-emerald-700':''}`}>3. Mercado</button>
                    </nav>

                    <main className="p-4">
                        {/* ABA 1: GERAL (CADASTRO) */}
                        {aba === 'geral' && (
                            <div className="space-y-6">
                                <section className="bg-gray-50 p-3 rounded-lg border">
                                    <h3 className="font-bold text-sm mb-2 uppercase text-gray-500">Nova Categoria</h3>
                                    <div className="flex gap-2">
                                        <input value={novaCat} onChange={e => setNovaCat(e.target.value)} className="border p-2 flex-1 rounded" placeholder="Nome da categoria..." />
                                        <button onClick={addCategoria} className="bg-emerald-600 text-white px-4 rounded font-bold">Add</button>
                                    </div>
                                </section>

                                <section>
                                    <h3 className="font-bold text-sm mb-2 uppercase text-gray-500">Novo Produto</h3>
                                    <div className="flex flex-col gap-2">
                                        <input value={novoItem.nome} onChange={e => setNovoItem({...novoItem, nome: e.target.value})} className="border p-2 rounded" placeholder="Nome do produto..." />
                                        <div className="flex gap-2">
                                            <select value={novoItem.cat} onChange={e => setNovoItem({...novoItem, cat: e.target.value})} className="border p-2 flex-1 rounded bg-white">
                                                {categorias.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                            <button onClick={addInventario} className="bg-emerald-600 text-white px-6 rounded font-bold">Salvar</button>
                                        </div>
                                    </div>
                                </section>

                                <div className="border-t pt-4">
                                    <h3 className="font-bold text-sm mb-2 uppercase text-gray-500">Itens Cadastrados</h3>
                                    {inventario.map(i => (
                                        <div key={i.id} className="flex justify-between p-2 border-b text-sm italic">
                                            <span>{i.nome}</span> <span className="text-emerald-600 font-semibold">{i.cat}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* ABA 2: PLANEJAR (SELECIONAR E QUANTIDADE) */}
                        {aba === 'preparo' && (
                            <div className="space-y-4">
                                <h2 className="font-bold text-lg text-emerald-800">O que vamos comprar hoje?</h2>
                                {categorias.map(cat => (
                                    <div key={cat} className="mb-4">
                                        <h4 className="bg-gray-200 p-1 px-3 rounded-full text-xs font-bold text-gray-600 inline-block mb-2">{cat}</h4>
                                        {inventario.filter(p => p.cat === cat).map(i => {
                                            const itemNaLista = listaCompra.find(lc => lc.id === i.id);
                                            return (
                                                <div key={i.id} className="flex items-center justify-between p-3 border-b bg-white">
                                                    <label className="flex items-center gap-3 cursor-pointer flex-1">
                                                        <input type="checkbox" checked={!!itemNaLista} onChange={() => toggleNaLista(i)} className="w-5 h-5 accent-emerald-600" />
                                                        <span className={itemNaLista ? "font-bold text-emerald-700" : ""}>{i.nome}</span>
                                                    </label>
                                                    
                                                    {itemNaLista && (
                                                        <div className="flex items-center gap-2 bg-emerald-50 p-1 rounded-lg border border-emerald-200">
                                                            <button onClick={() => atualizarQtd(i.id, -1)} className="px-2 font-bold text-emerald-600">-</button>
                                                            <span className="font-bold text-sm w-4 text-center">{itemNaLista.qtd}</span>
                                                            <button onClick={() => atualizarQtd(i.id, 1)} className="px-2 font-bold text-emerald-600">+</button>
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* ABA 3: MERCADO (CHECKOUT COM QUANTIDADE) */}
                        {aba === 'compras' && (
                            <div className="space-y-3">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="font-bold text-lg">Lista de Compras</h2>
                                    <span className="text-xs bg-emerald-100 text-emerald-700 px-2 py-1 rounded">
                                        {listaCompra.filter(i => i.comprado).length} de {listaCompra.length} pegos
                                    </span>
                                </div>
                                {listaCompra.length === 0 && <p className="text-center text-gray-400 mt-10">Nenhum item selecionado para hoje.</p>}
                                {listaCompra.sort((a,b) => a.cat.localeCompare(b.cat)).map(i => (
                                    <div key={i.id} onClick={() => checkItem(i.id)} 
                                        className={`p-4 rounded-xl border-2 flex justify-between items-center transition-all ${i.comprado ? 'bg-gray-100 border-transparent opacity-50' : 'bg-white border-white shadow-sm'}`}>
                                        <div className="flex items-center gap-4">
                                            <div className={`text-2xl ${i.comprado ? 'text-emerald-500' : 'text-gray-300'}`}>
                                                {i.comprado ? '✅' : '⬜'}
                                            </div>
                                            <div>
                                                <span className="text-[10px] font-black text-emerald-500 uppercase tracking-widest">{i.cat}</span>
                                                <p className={`text-lg font-medium ${i.comprado ? 'line-through text-gray-500' : 'text-gray-800'}`}>
                                                    {i.nome}
                                                </p>
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <span className="block text-xs text-gray-400 uppercase">Qtd</span>
                                            <span className="text-xl font-bold text-emerald-600">{i.qtd}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
