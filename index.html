<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista da Casa Final</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div id="root">
        <div style="padding: 20px; text-align: center;">Carregando sistema...</div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyD4jdw3dkSl-63iyBypdip4NXUah2mdie8",
            authDomain: "rag-final-474711.firebaseapp.com",
            databaseURL: "https://rag-final-474711-default-rtdb.firebaseio.com",
            projectId: "rag-final-474711",
            storageBucket: "rag-final-474711.firebasestorage.app",
            messagingSenderId: "281529599553",
            appId: "1:281529599553:web:2e466ab204c1dc7210a8c0"
        };

        // Inicialização protegida
        try {
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        } catch(e) { console.error("Erro Firebase:", e); }
        
        const db = firebase.database();

        function App() {
            const [aba, setAba] = useState('preparo');
            const [listaCompra, setListaCompra] = useState({});
            const [inventario, setInventario] = useState([]);
            const [status, setStatus] = useState("Iniciando...");
            const [busca, setBusca] = useState("");
            const [sugestoes, setSugestoes] = useState([]);
            const [qtd, setQtd] = useState("");
            const qtdRef = useRef();

            useEffect(() => {
                // Monitor de conexão
                db.ref(".info/connected").on("value", (snap) => {
                    setStatus(snap.val() ? "CONECTADO ✅" : "DESCONECTADO ❌");
                });

                // Ler produtos
                db.ref('inventario_mestre').on('value', (snap) => {
                    const data = snap.val() || {};
                    setInventario(Object.entries(data).map(([id, v]) => ({ id, ...v })));
                });

                // Ler lista do dia
                db.ref('compra_atual').on('value', (snap) => {
                    setListaCompra(snap.val() || {});
                });
            }, []);

            const add = (item) => {
                db.ref(`compra_atual/${item.id}`).set({
                    ...item,
                    qtd: qtd || "1",
                    comprado: false
                });
                setBusca(""); setQtd(""); setSugestoes([]);
            };

            const itensAgrupados = Object.values(listaCompra).reduce((acc, item) => {
                if (!acc[item.cat]) acc[item.cat] = [];
                acc[item.cat].push(item);
                return acc;
            }, {});

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white flex flex-col shadow-2xl">
                    <div className="bg-slate-800 text-[10px] text-white p-1 text-center font-bold">
                         {status} | {inventario.length} ITENS CADASTRADOS
                    </div>
                    
                    <nav className="flex bg-indigo-700 text-white font-black text-[10px] uppercase sticky top-0 z-50 shadow-md">
                        <button onClick={() => setAba('preparo')} className={`flex-1 py-4 ${aba==='preparo'?'bg-indigo-900 border-b-2 border-yellow-400':''}`}>Planejar</button>
                        <button onClick={() => setAba('compras')} className={`flex-1 py-4 ${aba==='compras'?'bg-indigo-900 border-b-2 border-yellow-400':''}`}>Mercado</button>
                    </nav>

                    <main className="flex-1 p-4 overflow-y-auto pb-10">
                        {aba === 'preparo' && (
                            <div className="space-y-4">
                                <div className="bg-indigo-600 p-4 rounded-3xl shadow-lg">
                                    <input 
                                        value={busca} 
                                        onChange={(e) => {
                                            setBusca(e.target.value);
                                            setSugestoes(e.target.value.length > 0 ? inventario.filter(i => i.nome.toLowerCase().includes(e.target.value.toLowerCase())).slice(0, 5) : []);
                                        }} 
                                        placeholder="🔍 Buscar produto..." 
                                        className="w-full p-4 rounded-2xl mb-2 outline-none text-slate-800 font-bold" 
                                    />
                                    {sugestoes.length > 0 && (
                                        <div className="bg-white rounded-2xl mb-2 shadow-2xl overflow-hidden border border-indigo-200">
                                            {sugestoes.map(s => (
                                                <div key={s.id} onClick={() => {setBusca(s.nome); setSugestoes([]); qtdRef.current.focus();}} className="p-4 border-b last:border-0 text-sm font-bold flex justify-between active:bg-indigo-100 cursor-pointer">
                                                    <span className="text-slate-800">{s.nome}</span>
                                                    <span className="text-[9px] bg-slate-100 px-2 py-1 rounded text-slate-400 uppercase tracking-tighter">{s.cat}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                    <div className="flex gap-2">
                                        <input ref={qtdRef} value={qtd} onChange={e => setQtd(e.target.value)} placeholder="Qtd..." className="flex-1 p-4 rounded-2xl outline-none font-bold" />
                                        <button onClick={() => {
                                            const item = inventario.find(i => i.nome.toLowerCase() === busca.toLowerCase());
                                            if(item) add(item);
                                        }} className="bg-yellow-400 text-indigo-900 px-8 rounded-2xl font-black uppercase text-xs">OK</button>
                                    </div>
                                </div>
                                <div className="space-y-2">
                                    {Object.entries(listaCompra).map(([id, item]) => (
                                        <div key={id} className="bg-white p-3 rounded-xl shadow-sm border-l-4 border-indigo-500 flex justify-between items-center">
                                            <span className="font-bold text-slate-700 text-sm uppercase">{item.nome} ({item.qtd})</span>
                                            <button onClick={() => db.ref(`compra_atual/${id}`).remove()} className="text-red-400 font-bold p-2 text-xl">✕</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {aba === 'compras' && (
                            <div className="space-y-6">
                                <div className="flex gap-2 mb-2 sticky top-0 z-10 p-1">
                                    <button onClick={() => db.ref('compra_atual').remove()} className="flex-1 bg-red-100 text-red-600 p-3 rounded-2xl text-[10px] font-bold uppercase">Zerar Lista</button>
                                </div>
                                {Object.keys(itensAgrupados).sort().map(cat => (
                                    <div key={cat} className="space-y-2">
                                        <h3 className="text-[10px] font-black text-indigo-300 uppercase text-center border-b pb-1">{cat}</h3>
                                        {itensAgrupados[cat].map(item => {
                                            const id = btoa(unescape(encodeURIComponent(item.nome))).replace(/=/g, "");
                                            return (
                                                <div key={id} onClick={() => db.ref(`compra_atual/${id}`).update({comprado: !item.comprado})} 
                                                     className={`p-4 rounded-3xl flex justify-between items-center transition-all ${item.comprado ? 'bg-slate-100 opacity-40 grayscale' : 'bg-white shadow-lg'}`}>
                                                    <div className="flex gap-4 items-center">
                                                        <div className="text-2xl">{item.comprado ? '✅' : '⬜'}</div>
                                                        <span className={`text-xl font-bold ${item.comprado ? 'line-through text-slate-400' : 'text-slate-800'}`}>{item.nome}</span>
                                                    </div>
                                                    <div className="bg-indigo-600 text-white px-3 py-1 rounded-xl font-bold text-xs">{item.qtd}</div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
