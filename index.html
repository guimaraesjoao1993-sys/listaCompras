<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista da Casa PRO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyD4jdw3dkSl-63iyBypdip4NXUah2mdie8",
            authDomain: "rag-final-474711.firebaseapp.com",
            databaseURL: "https://rag-final-474711-default-rtdb.firebaseio.com",
            projectId: "rag-final-474711",
            storageBucket: "rag-final-474711.firebasestorage.app",
            messagingSenderId: "281529599553",
            appId: "1:281529599553:web:2e466ab204c1dc7210a8c0"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function App() {
            const [aba, setAba] = useState('preparo');
            const [listaCompra, setListaCompra] = useState({});
            const [inventario, setInventario] = useState([]);
            const [busca, setBusca] = useState("");
            const [qtd, setQtd] = useState("");
            const [sugestoes, setSugestoes] = useState([]);

            useEffect(() => {
                // Sincronizar Inventário Mestre
                db.ref('inventario_mestre').on('value', snap => {
                    const val = snap.val();
                    if (!val) { setInventario([]); return; }
                    const transformado = Object.entries(val).map(([id, v]) => ({
                        id: id,
                        nome: v.nome || "Sem Nome",
                        cat: v.cat || "Geral"
                    }));
                    setInventario(transformado);
                });

                // Sincronizar Lista do Dia
                db.ref('compra_atual').on('value', snap => {
                    setListaCompra(snap.val() || {});
                });
            }, []);

            // Função para Adicionar "Na Marra"
            const adicionarItem = (nomeManual, catManual = "Geral") => {
                if (!nomeManual) return;
                const idSeguro = btoa(unescape(encodeURIComponent(nomeManual))).replace(/=/g, "");
                
                db.ref(`compra_atual/${idSeguro}`).set({
                    nome: nomeManual,
                    cat: catManual,
                    qtd: qtd || "1",
                    comprado: false
                }).then(() => {
                    setBusca("");
                    setQtd("");
                    setSugestoes([]);
                });
            };

            const itensAgrupados = Object.values(listaCompra).reduce((acc, item) => {
                if (!acc[item.cat]) acc[item.cat] = [];
                acc[item.cat].push(item);
                return acc;
            }, {});

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white flex flex-col shadow-2xl">
                    <header className="bg-indigo-700 text-white p-4 text-center">
                        <h1 className="font-bold uppercase tracking-tighter">Lista da Casa PRO</h1>
                        <p className="text-[9px] opacity-70 italic">Banco: {inventario.length} itens</p>
                    </header>

                    <nav className="flex bg-indigo-600 text-white font-bold text-xs">
                        <button onClick={() => setAba('preparo')} className={`flex-1 py-4 ${aba==='preparo'?'bg-indigo-900 border-b-4 border-yellow-400':''}`}>1. Planejar</button>
                        <button onClick={() => setAba('compras')} className={`flex-1 py-4 ${aba==='compras'?'bg-indigo-900 border-b-4 border-yellow-400':''}`}>2. Mercado</button>
                    </nav>

                    <main className="p-4 flex-1 overflow-y-auto pb-20">
                        {aba === 'preparo' && (
                            <div className="space-y-4">
                                <div className="bg-slate-100 p-4 rounded-2xl border-2 border-indigo-100">
                                    <input 
                                        value={busca} 
                                        onChange={(e) => {
                                            setBusca(e.target.value);
                                            const filtrados = inventario.filter(i => 
                                                i.nome.toLowerCase().includes(e.target.value.toLowerCase())
                                            ).slice(0, 5);
                                            setSugestoes(e.target.value ? filtrados : []);
                                        }} 
                                        placeholder="Nome do produto..." 
                                        className="w-full p-3 rounded-xl mb-2 border-none outline-none font-bold" 
                                    />

                                    {sugestoes.map(s => (
                                        <div key={s.id} onClick={() => { setBusca(s.nome); setSugestoes([]); }} className="p-3 bg-white mb-1 rounded-lg shadow-sm border text-sm flex justify-between cursor-pointer active:bg-indigo-50">
                                            <span>{s.nome}</span> <span className="text-[10px] text-slate-400 uppercase">{s.cat}</span>
                                        </div>
                                    ))}

                                    <div className="flex gap-2 mt-2">
                                        <input value={qtd} onChange={e => setQtd(e.target.value)} placeholder="Qtd" className="w-20 p-3 rounded-xl border-none outline-none font-bold" />
                                        <button onClick={() => adicionarItem(busca)} className="flex-1 bg-indigo-600 text-white font-bold rounded-xl uppercase text-xs">Adicionar</button>
                                    </div>
                                    <p className="text-[9px] text-slate-400 mt-2 text-center">*Se não sugerir, digite o nome e clique em Adicionar mesmo assim.</p>
                                </div>

                                <div className="space-y-2">
                                    {Object.entries(listaCompra).map(([id, item]) => (
                                        <div key={id} className="flex justify-between items-center p-3 bg-white border border-slate-200 rounded-xl shadow-sm">
                                            <span className="font-bold text-slate-700 text-sm uppercase">{item.nome} ({item.qtd})</span>
                                            <button onClick={() => db.ref(`compra_atual/${id}`).remove()} className="text-red-500 font-bold p-2 text-xl">✕</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {aba === 'compras' && (
                            <div className="space-y-6">
                                <button onClick={() => db.ref('compra_atual').remove()} className="w-full bg-red-50 text-red-600 p-2 rounded-xl text-[10px] font-bold uppercase">Limpar Lista</button>
                                {Object.keys(itensAgrupados).sort().map(cat => (
                                    <div key={cat} className="space-y-2">
                                        <h3 className="text-[10px] font-black text-indigo-400 uppercase text-center border-b pb-1 tracking-widest">{cat}</h3>
                                        {itensAgrupados[cat].map(item => {
                                            const idSeguro = btoa(unescape(encodeURIComponent(item.nome))).replace(/=/g, "");
                                            return (
                                                <div key={idSeguro} onClick={() => db.ref(`compra_atual/${idSeguro}`).update({comprado: !item.comprado})} 
                                                     className={`p-4 rounded-2xl flex justify-between items-center transition-all ${item.comprado ? 'bg-slate-100 opacity-40 grayscale' : 'bg-white shadow-lg border'}`}>
                                                    <div className="flex gap-4 items-center">
                                                        <div className="text-2xl">{item.comprado ? '✅' : '⬜'}</div>
                                                        <span className={`text-lg font-bold ${item.comprado ? 'line-through text-slate-400' : 'text-slate-800'}`}>{item.nome}</span>
                                                    </div>
                                                    <div className="bg-indigo-600 text-white px-3 py-1 rounded-lg font-bold text-xs">{item.qtd}</div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
