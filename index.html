<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista da Casa PRO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyD4jdw3dkSl-63iyBypdip4NXUah2mdie8",
            authDomain: "rag-final-474711.firebaseapp.com",
            databaseURL: "https://rag-final-474711-default-rtdb.firebaseio.com",
            projectId: "rag-final-474711",
            storageBucket: "rag-final-474711.firebasestorage.app",
            messagingSenderId: "281529599553",
            appId: "1:281529599553:web:2e466ab204c1dc7210a8c0"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Função para remover acentos na busca
        const normalizar = (str) => str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();

        function App() {
            const [aba, setAba] = useState('preparo');
            const [listaCompra, setListaCompra] = useState({});
            const [inventario, setInventario] = useState([]);
            const [status, setStatus] = useState("Iniciando...");
            const [busca, setBusca] = useState("");
            const [sugestoes, setSugestoes] = useState([]);
            const [exibirCatalogo, setExibirCatalogo] = useState(false);
            const [qtd, setQtd] = useState("");
            const qtdRef = useRef();

            useEffect(() => {
                db.ref(".info/connected").on("value", snap => setStatus(snap.val() ? "ON ✅" : "OFF ❌"));
                
                // Puxar Inventário Mestre
                db.ref('inventario_mestre').on('value', snap => {
                    const data = snap.val() || {};
                    const lista = Object.entries(data).map(([id, v]) => ({ id, ...v }));
                    setInventario(lista);
                    console.log("Produtos carregados no estado:", lista.length);
                });

                db.ref('compra_atual').on('value', snap => setListaCompra(snap.val() || {}));
            }, []);

            const filtrarBusca = (v) => {
                setBusca(v);
                if (v.length > 0) {
                    const termo = normalizar(v);
                    const filtrados = inventario.filter(i => normalizar(i.nome).includes(termo)).slice(0, 8);
                    setSugestoes(filtrados);
                } else {
                    setSugestoes([]);
                }
            };

            const addParaLista = (item) => {
                db.ref(`compra_atual/${item.id}`).set({ ...item, qtd: qtd || "1", comprado: false });
                setBusca(""); setQtd(""); setSugestoes([]); setExibirCatalogo(false);
            };

            const itensAgrupadosMercado = Object.values(listaCompra).reduce((acc, item) => {
                if (!acc[item.cat]) acc[item.cat] = [];
                acc[item.cat].push(item);
                return acc;
            }, {});

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 flex flex-col shadow-2xl pb-20">
                    <div className="bg-slate-800 text-[10px] text-white p-1 text-center font-bold tracking-widest">
                        ESTOQUE MESTRE: {inventario.length} ITENS | {status}
                    </div>
                    
                    <nav className="flex bg-indigo-700 text-white font-black text-[10px] uppercase sticky top-0 z-50">
                        <button onClick={() => setAba('preparo')} className={`flex-1 py-4 ${aba==='preparo'?'bg-indigo-900 border-b-4 border-yellow-400':''}`}>Planejar</button>
                        <button onClick={() => setAba('compras')} className={`flex-1 py-4 ${aba==='compras'?'bg-indigo-900 border-b-4 border-yellow-400':''}`}>Mercado</button>
                        <button onClick={() => setAba('config')} className={`flex-1 py-4 ${aba==='config'?'bg-indigo-900 border-b-4 border-yellow-400':''}`}>⚙️ Admin</button>
                    </nav>

                    <main className="p-4 overflow-y-auto flex-1">
                        {aba === 'preparo' && (
                            <div className="space-y-4">
                                <div className="bg-indigo-600 p-5 rounded-[2.5rem] shadow-xl">
                                    <p className="text-[10px] text-white opacity-70 mb-2 uppercase font-bold text-center">O que está faltando?</p>
                                    <input 
                                        value={busca} 
                                        onChange={e => filtrarBusca(e.target.value)} 
                                        placeholder="🔍 Nome do produto..." 
                                        className="w-full p-4 rounded-2xl mb-2 outline-none text-slate-800 font-bold" 
                                    />
                                    
                                    {sugestoes.length > 0 && (
                                        <div className="bg-white rounded-2xl mb-2 shadow-2xl overflow-hidden border border-indigo-200">
                                            {sugestoes.map(s => (
                                                <div key={s.id} onClick={() => {setBusca(s.nome); setSugestoes([]); qtdRef.current.focus();}} className="p-4 border-b last:border-0 text-sm font-black flex justify-between active:bg-indigo-100 cursor-pointer">
                                                    <span>{s.nome}</span>
                                                    <span className="text-[9px] bg-slate-100 px-2 py-1 rounded text-slate-400 uppercase">{s.cat}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    <div className="flex gap-2">
                                        <input ref={qtdRef} value={qtd} onChange={e => setQtd(e.target.value)} placeholder="Qtd..." className="flex-1 p-4 rounded-2xl outline-none text-center font-black" />
                                        <button onClick={() => {
                                            const item = inventario.find(i => i.nome.toLowerCase() === busca.toLowerCase());
                                            if(item) addParaLista(item);
                                        }} className="bg-yellow-400 text-indigo-900 px-6 rounded-2xl font-black uppercase text-xs">Adicionar</button>
                                    </div>
                                    
                                    <button 
                                        onClick={() => setExibirCatalogo(!exibirCatalogo)} 
                                        className="w-full mt-4 text-[10px] text-indigo-200 underline uppercase font-bold"
                                    >
                                        {exibirCatalogo ? "Fechar Catálogo" : "Ver Catálogo Completo"}
                                    </button>
                                </div>

                                {exibirCatalogo && (
                                    <div className="bg-white p-4 rounded-2xl border-2 border-indigo-100 max-h-60 overflow-y-auto shadow-inner">
                                        <p className="text-[10px] font-bold text-slate-400 mb-2 uppercase">Clique para selecionar:</p>
                                        {inventario.sort((a,b) => a.nome.localeCompare(b.nome)).map(i => (
                                            <div key={i.id} onClick={() => {setBusca(i.nome); setExibirCatalogo(false); qtdRef.current.focus();}} className="p-2 border-b text-xs flex justify-between cursor-pointer">
                                                <span>{i.nome}</span> <span className="text-slate-300 italic">{i.cat}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                <div className="space-y-2 mt-6">
                                    {Object.entries(listaCompra).map(([id, item]) => (
                                        <div key={id} className="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-indigo-500 flex justify-between items-center">
                                            <span className="font-bold text-slate-700 text-sm uppercase">{item.nome} <span className="text-indigo-500 ml-2">({item.qtd})</span></span>
                                            <button onClick={() => db.ref(`compra_atual/${id}`).remove()} className="text-red-400 font-bold p-2 text-xl">✕</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {aba === 'compras' && (
                            <div className="space-y-6">
                                {Object.keys(itensAgrupadosMercado).sort().map(cat => (
                                    <div key={cat} className="space-y-2">
                                        <h3 className="text-[10px] font-black text-indigo-300 uppercase text-center tracking-[0.3em] py-2 border-b border-indigo-50">{cat}</h3>
                                        {itensAgrupadosMercado[cat].map(item => {
                                            const id = btoa(unescape(encodeURIComponent(item.nome))).replace(/=/g, "");
                                            return (
                                                <div key={id} onClick={() => db.ref(`compra_atual/${id}`).update({comprado: !item.comprado})} 
                                                     className={`p-5 rounded-[2rem] flex justify-between items-center transition-all ${item.comprado ? 'bg-slate-100 opacity-40 grayscale scale-95' : 'bg-white shadow-xl border-2 border-white'}`}>
                                                    <div className="flex gap-4 items-center">
                                                        <div className="text-3xl">{item.comprado ? '✅' : '⬜'}</div>
                                                        <span className={`text-xl font-black tracking-tight ${item.comprado ? 'line-through text-slate-400' : 'text-slate-800'}`}>{item.nome}</span>
                                                    </div>
                                                    <div className="bg-indigo-700 text-white px-4 py-2 rounded-2xl font-black text-xs shadow-md">{item.qtd}</div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                ))}
                            </div>
                        )}
                        
                        {aba === 'config' && (
                            <div className="flex flex-col items-center py-20 text-center gap-4">
                                <p className="text-xs text-slate-400 uppercase font-bold tracking-tighter">Gestão do Banco de Dados</p>
                                <button onClick={() => {
                                    if(confirm("Zerar inventário?")) db.ref('inventario_mestre').remove();
                                }} className="bg-red-100 text-red-600 px-6 py-3 rounded-xl font-bold text-xs uppercase shadow-sm">Apagar Todos os Produtos</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
