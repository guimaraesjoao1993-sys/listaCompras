<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lista da Casa PRO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .aba-ativa { border-bottom: 4px solid #facc15; background-color: #312e81; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="status-bar" class="bg-slate-800 text-[10px] text-white p-1 text-center font-bold uppercase">
        Carregando...
    </div>

    <nav class="flex bg-indigo-700 text-white font-bold text-[10px] uppercase sticky top-0 z-50 shadow-lg">
        <button onclick="mudarAba('preparo')" id="btn-preparo" class="flex-1 py-4 aba-ativa">1. Planejar</button>
        <button onclick="mudarAba('compras')" id="btn-compras" class="flex-1 py-4">2. Mercado</button>
        <button onclick="mudarAba('editar')" id="btn-editar" class="flex-1 py-4">3. Banco</button>
    </nav>

    <main class="max-w-md mx-auto p-4 pb-24">
        
        <section id="aba-preparo" class="space-y-4">
            <div class="bg-indigo-50 p-4 rounded-3xl border border-indigo-100 shadow-inner">
                <input type="text" id="busca-input" oninput="filtrarBusca()" placeholder="🔍 O que está faltando?" class="w-full p-4 rounded-2xl mb-2 font-bold outline-none border-none shadow-sm">
                <div id="sugestoes-box" class="space-y-1 mb-2"></div>
                
                <div class="flex gap-2">
                    <input type="text" id="qtd-input" placeholder="Qtd" class="w-20 p-3 rounded-xl outline-none font-bold border bg-white">
                    <input type="text" id="obs-input" placeholder="Observação..." class="flex-1 p-3 rounded-xl outline-none italic text-sm border bg-white">
                </div>
                <button onclick="adicionarManual()" class="w-full mt-3 bg-indigo-600 text-white font-black py-4 rounded-2xl uppercase text-xs shadow-lg active:scale-95 transition-all">Adicionar à Lista</button>
            </div>
            <div id="lista-preparo-atual" class="space-y-2 pt-4"></div>
        </section>

        <section id="aba-compras" class="hidden space-y-6">
            <button onclick="zerarLista()" class="w-full bg-red-50 text-red-600 p-3 rounded-xl text-[10px] font-black uppercase">Limpar Lista</button>
            <div id="lista-mercado-final" class="space-y-6"></div>
        </section>

        <section id="aba-editar" class="hidden space-y-4">
            <input type="text" id="filtro-banco" oninput="renderizarBanco()" placeholder="🔍 Pesquisar no estoque..." class="w-full p-4 rounded-xl border-2 outline-none font-bold shadow-sm mb-4">
            <div id="lista-banco-mestre" class="space-y-3"></div>
        </section>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD4jdw3dkSl-63iyBypdip4NXUah2mdie8",
            authDomain: "rag-final-474711.firebaseapp.com",
            databaseURL: "https://rag-final-474711-default-rtdb.firebaseio.com",
            projectId: "rag-final-474711",
            storageBucket: "rag-final-474711.firebasestorage.app",
            messagingSenderId: "281529599553",
            appId: "1:281529599553:web:2e466ab204c1dc7210a8c0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let inventario = [];
        let compraAtual = {};

        // Função para ignorar acentos e maiúsculas
        function limparTexto(str) {
            return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
        }

        db.ref('inventario_mestre').on('value', snap => {
            const val = snap.val() || {};
            inventario = Object.entries(val).map(([id, v]) => ({ id, ...v }));
            document.getElementById('status-bar').innerText = `BANCO ATIVO ✅ | ${inventario.length} ITENS`;
        });

        db.ref('compra_atual').on('value', snap => {
            compraAtual = snap.val() || {};
            renderizarListaPreparo();
            renderizarMercado();
        });

        function mudarAba(aba) {
            ['preparo', 'compras', 'editar'].forEach(a => {
                document.getElementById('aba-' + a).classList.add('hidden');
                document.getElementById('btn-' + a).classList.remove('aba-ativa');
            });
            document.getElementById('aba-' + aba).classList.remove('hidden');
            document.getElementById('btn-' + aba).classList.add('aba-ativa');
            if(aba === 'editar') renderizarBanco();
        }

        function filtrarBusca() {
            const input = document.getElementById('busca-input').value;
            const termo = limparTexto(input);
            const box = document.getElementById('sugestoes-box');
            box.innerHTML = '';
            
            if (termo.length < 1) return;

            // Busca inteligente
            const filtrados = inventario.filter(i => {
                const nomeLimpo = limparTexto(i.nome);
                return nomeLimpo.includes(termo);
            }).slice(0, 6);

            filtrados.forEach(s => {
                const div = document.createElement('div');
                div.className = "p-4 bg-white mb-1 rounded-xl border-2 border-indigo-100 text-sm font-bold flex justify-between cursor-pointer active:bg-indigo-100";
                div.innerHTML = `<span>${s.nome}</span> <span class="text-[9px] opacity-40 uppercase">${s.cat}</span>`;
                div.onclick = () => {
                    document.getElementById('busca-input').value = s.nome;
                    box.innerHTML = '';
                    document.getElementById('qtd-input').focus();
                };
                box.appendChild(div);
            });
        }

        function adicionarManual() {
            const nome = document.getElementById('busca-input').value;
            const qtd = document.getElementById('qtd-input').value || "1";
            const obs = document.getElementById('obs-input').value || "";
            if (!nome) return;

            const itemExistente = inventario.find(i => i.nome === nome);
            const categoria = itemExistente ? itemExistente.cat : "Geral";
            const id = btoa(unescape(encodeURIComponent(nome))).replace(/=/g, "");

            db.ref('compra_atual/' + id).set({
                nome, qtd, obs, comprado: false, cat: categoria
            });
            
            document.getElementById('busca-input').value = '';
            document.getElementById('qtd-input').value = '';
            document.getElementById('obs-input').value = '';
            document.getElementById('sugestoes-box').innerHTML = '';
        }

        function renderizarListaPreparo() {
            const container = document.getElementById('lista-preparo-atual');
            container.innerHTML = '';
            Object.entries(compraAtual).forEach(([id, item]) => {
                const div = document.createElement('div');
                div.className = "p-4 bg-white rounded-2xl shadow-sm border-l-4 border-indigo-500 flex justify-between items-center mb-2";
                div.innerHTML = `<div><p class="font-bold text-xs uppercase">${item.nome} (${item.qtd})</p>
                                 <p class="text-[10px] text-indigo-500 italic">${item.obs || ''}</p></div>
                                 <button onclick="remover('${id}')" class="text-red-400 font-bold p-2 text-xl">✕</button>`;
                container.appendChild(div);
            });
        }

        function renderizarMercado() {
            const container = document.getElementById('lista-mercado-final');
            container.innerHTML = '';
            const cats = {};
            Object.values(compraAtual).forEach(i => {
                if(!cats[i.cat]) cats[i.cat] = [];
                cats[i.cat].push(i);
            });

            Object.keys(cats).sort().forEach(cat => {
                const sec = document.createElement('div');
                sec.innerHTML = `<h3 class="text-[10px] font-black text-indigo-400 uppercase text-center border-b pb-1 mb-2 tracking-widest">${cat}</h3>`;
                cats[cat].forEach(item => {
                    const id = btoa(unescape(encodeURIComponent(item.nome))).replace(/=/g, "");
                    const card = document.createElement('div');
                    card.className = `p-4 rounded-3xl flex justify-between items-center mb-2 transition-all ${item.comprado ? 'bg-gray-200 opacity-40 scale-95' : 'bg-white shadow-md'}`;
                    card.onclick = () => db.ref('compra_atual/' + id).update({comprado: !item.comprado});
                    card.innerHTML = `<div class="flex gap-4 items-center">
                                        <div class="text-xl">${item.comprado ? '✅' : '⬜'}</div>
                                        <div><span class="text-base font-bold ${item.comprado ? 'line-through text-gray-500' : 'text-gray-800'}">${item.nome}</span>
                                        <p class="text-[10px] text-indigo-500">${item.obs || ''}</p></div>
                                      </div>
                                      <div class="bg-indigo-700 text-white px-3 py-1 rounded-xl font-bold text-xs">${item.qtd}</div>`;
                    sec.appendChild(card);
                });
                container.appendChild(sec);
            });
        }

        function renderizarBanco() {
            const filtro = limparTexto(document.getElementById('filtro-banco').value);
            const container = document.getElementById('lista-banco-mestre');
            container.innerHTML = '';
            const filtrados = inventario.filter(i => limparTexto(i.nome).includes(filtro)).slice(0, 10);

            filtrados.forEach(item => {
                const div = document.createElement('div');
                div.className = "p-4 bg-white border rounded-2xl space-y-2 mb-2 shadow-sm";
                div.innerHTML = `<div class="flex gap-2">
                                    <input type="text" value="${item.nome}" onblur="atualizarBanco('${item.id}', this.value, '${item.cat}')" class="flex-1 font-bold p-2 bg-gray-50 rounded text-sm border">
                                    <button onclick="excluirBanco('${item.id}')" class="text-red-400 font-bold px-2">✕</button>
                                 </div>
                                 <select onchange="atualizarBanco('${item.id}', '${item.nome}', this.value)" class="w-full p-2 bg-gray-100 rounded text-[10px] font-bold uppercase">
                                    <option ${item.cat==='Geral'?'selected':''} value="Geral">Geral</option>
                                    <option ${item.cat==='Seminaristas'?'selected':''} value="Seminaristas">Seminaristas</option>
                                    <option ${item.cat==='Hortifruti'?'selected':''} value="Hortifruti">Hortifruti</option>
                                    <option ${item.cat==='Carnes'?'selected':''} value="Carnes">Carnes</option>
                                    <option ${item.cat==='Diversos'?'selected':''} value="Diversos">Diversos</option>
                                    <option ${item.cat==='Frios'?'selected':''} value="Frios">Frios</option>
                                    <option ${item.cat==='Frutas'?'selected':''} value="Frutas">Frutas</option>
                                 </select>`;
                container.appendChild(div);
            });
        }

        function remover(id) { db.ref('compra_atual/' + id).remove(); }
        function zerarLista() { if(confirm("Limpar lista?")) db.ref('compra_atual').remove(); }
        function atualizarBanco(id, nome, cat) { db.ref('inventario_mestre/' + id).update({nome, cat}); }
        function excluirBanco(id) { if(confirm("Excluir do banco?")) db.ref('inventario_mestre/' + id).remove(); }
    </script>
</body>
</html>
