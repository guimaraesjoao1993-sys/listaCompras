<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista do Seminário - Versão PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-slate-100 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { jsPDF } = window.jspdf;

        const firebaseConfig = {
            apiKey: "AIzaSyD4jdw3dkSl-63iyBypdip4NXUah2mdie8",
            authDomain: "rag-final-474711.firebaseapp.com",
            databaseURL: "https://rag-final-474711-default-rtdb.firebaseio.com",
            projectId: "rag-final-474711",
            storageBucket: "rag-final-474711.firebasestorage.app",
            messagingSenderId: "281529599553",
            appId: "1:281529599553:web:2e466ab204c1dc7210a8c0",
            measurementId: "G-2JPNZNTGQQ"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function App() {
            const [aba, setAba] = useState('preparo');
            const [listaCompra, setListaCompra] = useState({});
            const [categorias, setCategorias] = useState(["Seminaristas", "Geral", "Diversos", "Hortifruti", "Frutas", "Carnes", "Frios"]);
            const [inventario, setInventario] = useState([]);
            
            const [novaCatInput, setNovaCatInput] = useState('');
            const [novoProdNome, setNovoProdNome] = useState('');
            const [novoProdCat, setNovoProdCat] = useState('Geral');

            const [inputBusca, setInputBusca] = useState('');
            const [inputQtd, setInputQtd] = useState('');
            const [sugestoes, setSugestoes] = useState([]);
            const qtdRef = useRef(null);

            useEffect(() => {
                db.ref('compra_atual').on('value', snap => setListaCompra(snap.val() || {}));
                db.ref('categorias').on('value', snap => { if(snap.val()) setCategorias(snap.val()); });
                db.ref('inventario_mestre').on('value', snap => {
                    const data = snap.val() || {};
                    setInventario(Object.values(data));
                });
            }, []);

            const addCategoriaMestre = () => {
                if(!novaCatInput) return;
                const novas = [...categorias, novaCatInput];
                db.ref('categorias').set(novas);
                setNovaCatInput('');
            };

            const addProdutoMestre = () => {
                if(!novoProdNome) return;
                const id = btoa(unescape(encodeURIComponent(novoProdNome))).replace(/=/g, "");
                db.ref(`inventario_mestre/${id}`).set({ nome: novoProdNome, cat: novoProdCat });
                setNovoProdNome('');
            };

            const handleBusca = (val) => {
                setInputBusca(val);
                if (val.length > 1) {
                    const filtered = inventario.filter(i => i.nome.toLowerCase().includes(val.toLowerCase())).slice(0, 5);
                    setSugestoes(filtered);
                } else { setSugestoes([]); }
            };

            const adicionarItemFinal = () => {
                const item = inventario.find(i => i.nome.toLowerCase() === inputBusca.toLowerCase());
                if (item) {
                    const id = btoa(unescape(encodeURIComponent(item.nome))).replace(/=/g, "");
                    db.ref(`compra_atual/${id}`).set({ nome: item.nome, cat: item.cat, qtd: inputQtd || "1", comprado: false });
                    setInputBusca(''); setInputQtd('');
                }
            };

            const exportarPDF = () => {
                const doc = new jsPDF();
                doc.setFontSize(16);
                doc.text("Lista de Compras Organizada", 20, 20);
                let y = 30;
                
                const catsNaLista = [...new Set(Object.values(listaCompra).map(i => i.cat))].sort();
                
                catsNaLista.forEach(cat => {
                    doc.setFontSize(12);
                    doc.setFont("helvetica", "bold");
                    doc.text(cat.toUpperCase(), 20, y);
                    y += 7;
                    doc.setFont("helvetica", "normal");
                    doc.setFontSize(10);
                    
                    Object.values(listaCompra).filter(i => i.cat === cat).forEach(item => {
                        doc.text(`[ ] ${item.nome} - ${item.qtd}`, 25, y);
                        y += 6;
                        if (y > 280) { doc.addPage(); y = 20; }
                    });
                    y += 4;
                });
                doc.save("lista-compras.pdf");
            };

            // Agrupamento para exibição no mercado
            const itensAgrupados = Object.entries(listaCompra).reduce((acc, [id, item]) => {
                if (!acc[item.cat]) acc[item.cat] = [];
                acc[item.cat].push({ id, ...item });
                return acc;
            }, {});

            const categoriasOrdenadas = Object.keys(itensAgrupados).sort();

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 flex flex-col shadow-2xl">
                    <nav className="flex bg-indigo-700 text-white font-bold text-[10px] sticky top-0 z-50 shadow-lg uppercase">
                        <button onClick={() => setAba('preparo')} className={`flex-1 py-4 ${aba==='preparo'?'bg-indigo-900 border-b-4 border-yellow-400':''}`}>Planejar</button>
                        <button onClick={() => setAba('compras')} className={`flex-1 py-4 ${aba==='compras'?'bg-indigo-900 border-b-4 border-yellow-400':''}`}>Mercado</button>
                        <button onClick={() => setAba('config')} className={`flex-1 py-4 ${aba==='config'?'bg-indigo-900 border-b-4 border-yellow-400':''}`}>⚙️ Itens</button>
                    </nav>

                    <main className="flex-1 p-4 overflow-y-auto pb-10">
                        {aba === 'config' && (
                            <div className="space-y-6">
                                <section className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                                    <h3 className="text-xs font-black text-indigo-600 uppercase mb-4">Nova Categoria</h3>
                                    <div className="flex gap-2">
                                        <input value={novaCatInput} onChange={e => setNovaCatInput(e.target.value)} placeholder="Ex: Bebidas" className="flex-1 p-2 bg-slate-100 rounded-lg outline-none text-sm" />
                                        <button onClick={addCategoriaMestre} className="bg-indigo-600 text-white px-4 rounded-lg font-bold">+</button>
                                    </div>
                                </section>

                                <section className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                                    <h3 className="text-xs font-black text-indigo-600 uppercase mb-4">Novo Produto Mestre</h3>
                                    <div className="flex flex-col gap-3">
                                        <input value={novoProdNome} onChange={e => setNovoProdNome(e.target.value)} placeholder="Nome do produto..." className="p-2 bg-slate-100 rounded-lg outline-none text-sm" />
                                        <div className="flex gap-2">
                                            <select value={novoProdCat} onChange={e => setNovoProdCat(e.target.value)} className="flex-1 p-2 bg-slate-100 rounded-lg text-sm outline-none">
                                                {categorias.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                            <button onClick={addProdutoMestre} className="bg-indigo-600 text-white px-6 rounded-lg font-bold text-sm">Salvar</button>
                                        </div>
                                    </div>
                                </section>
                            </div>
                        )}

                        {aba === 'preparo' && (
                            <div className="space-y-4">
                                <div className="bg-indigo-50 p-4 rounded-2xl border border-indigo-100 relative shadow-inner">
                                    <p className="text-[10px] font-bold text-indigo-400 uppercase mb-2 text-center tracking-widest">Montar Compra do Dia</p>
                                    <div className="flex flex-col gap-3">
                                        <div className="relative">
                                            <input value={inputBusca} onChange={e => handleBusca(e.target.value)} placeholder="Buscar produto..." className="w-full p-3 rounded-xl outline-none text-sm shadow-sm" />
                                            {sugestoes.length > 0 && (
                                                <div className="absolute top-full left-0 right-0 bg-white shadow-2xl rounded-b-xl z-30 border mt-1">
                                                    {sugestoes.map(s => (
                                                        <div key={s.nome} onClick={() => {setInputBusca(s.nome); setSugestoes([]); qtdRef.current.focus();}} className="p-3 hover:bg-indigo-50 cursor-pointer border-b text-sm flex justify-between">
                                                            <span className="font-bold">{s.nome}</span>
                                                            <span className="text-[9px] text-slate-400 uppercase">{s.cat}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                        <div className="flex gap-2">
                                            <input ref={qtdRef} placeholder="Qtd (Ex: 2kg, 3un)" value={inputQtd} onChange={e => setInputQtd(e.target.value)} onKeyDown={e => e.key === 'Enter' && adicionarItemFinal()} className="flex-1 p-3 bg-white rounded-xl outline-none text-sm font-bold shadow-sm" />
                                            <button onClick={adicionarItemFinal} className="bg-indigo-600 text-white px-8 rounded-xl font-bold shadow-md">Add</button>
                                        </div>
                                    </div>
                                </div>
                                <div className="space-y-2 mt-4">
                                    {Object.entries(listaCompra).map(([id, item]) => (
                                        <div key={id} className="flex justify-between items-center p-3 bg-white border border-slate-100 rounded-xl shadow-sm">
                                            <span className="font-bold text-slate-700 text-sm">{item.nome} <small className="text-indigo-400 font-black">({item.qtd})</small></span>
                                            <button onClick={() => db.ref(`compra_atual/${id}`).remove()} className="text-red-400 font-bold px-2 text-lg">✕</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {aba === 'compras' && (
                            <div className="space-y-6">
                                <div className="flex gap-2 mb-2 sticky top-2 z-10">
                                    <button onClick={exportarPDF} className="flex-1 bg-indigo-600 text-white p-2 rounded-xl text-[10px] font-bold uppercase shadow-lg">Exportar PDF</button>
                                    <button onClick={() => window.confirm("Zerar carrinho?") && db.ref('compra_atual').remove()} className="flex-1 bg-red-100 text-red-600 p-2 rounded-xl text-[10px] font-bold uppercase shadow-sm">Zerar Lista</button>
                                </div>

                                {categoriasOrdenadas.map(cat => (
                                    <div key={cat} className="space-y-2">
                                        <div className="flex items-center gap-2 px-1">
                                            <div className="h-[2px] flex-1 bg-indigo-100"></div>
                                            <h2 className="text-[10px] font-black text-indigo-400 uppercase tracking-widest">{cat}</h2>
                                            <div className="h-[2px] flex-1 bg-indigo-100"></div>
                                        </div>
                                        {itensAgrupados[cat].map((item) => (
                                            <div key={item.id} onClick={() => db.ref(`compra_atual/${item.id}`).update({comprado: !item.comprado})} 
                                                className={`p-4 rounded-2xl border-2 flex justify-between items-center transition-all ${item.comprado ? 'bg-slate-100 border-transparent opacity-50' : 'bg-white border-white shadow-md active:scale-95'}`}>
                                                <div className="flex gap-4 items-center">
                                                    <div className="text-2xl">{item.comprado ? '✅' : '⬜'}</div>
                                                    <p className={`text-lg font-bold leading-tight ${item.comprado ? 'line-through text-slate-400' : 'text-slate-800'}`}>{item.nome}</p>
                                                </div>
                                                <div className="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-lg font-black text-xs">{item.qtd}</div>
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
