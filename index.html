<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista da Casa PRO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyD4jdw3dkSl-63iyBypdip4NXUah2mdie8",
            authDomain: "rag-final-474711.firebaseapp.com",
            databaseURL: "https://rag-final-474711-default-rtdb.firebaseio.com",
            projectId: "rag-final-474711",
            storageBucket: "rag-final-474711.firebasestorage.app",
            messagingSenderId: "281529599553",
            appId: "1:281529599553:web:2e466ab204c1dc7210a8c0"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function App() {
            const [aba, setAba] = useState('preparo');
            const [listaCompra, setListaCompra] = useState({});
            const [inventario, setInventario] = useState([]);
            const [busca, setBusca] = useState("");
            const [qtd, setQtd] = useState("");
            const [obs, setObs] = useState("");
            const [filtroEdit, setFiltroEdit] = useState("");

            useEffect(() => {
                // Carrega inventário apenas se necessário (otimização de memória)
                const invRef = db.ref('inventario_mestre');
                invRef.on('value', snap => {
                    const val = snap.val() || {};
                    setInventario(Object.entries(val).map(([id, v]) => ({ id, ...v })));
                });

                const listRef = db.ref('compra_atual');
                listRef.on('value', snap => setListaCompra(snap.val() || {}));

                return () => { invRef.off(); listRef.off(); };
            }, []);

            // Lógica de busca segura
            const sugestoes = useMemo(() => {
                if (aba !== 'preparo' || busca.length < 2) return [];
                return inventario.filter(i => i.nome.toLowerCase().includes(busca.toLowerCase())).slice(0, 5);
            }, [busca, inventario, aba]);

            const add = (nome, cat) => {
                const id = btoa(unescape(encodeURIComponent(nome))).replace(/=/g, "");
                db.ref(`compra_atual/${id}`).set({
                    nome, cat: cat || "Geral", qtd: qtd || "1", obs: obs || "", comprado: false
                }).then(() => { setBusca(""); setQtd(""); setObs(""); });
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white shadow-2xl flex flex-col">
                    <nav className="flex bg-indigo-700 text-white font-bold text-[10px] uppercase sticky top-0 z-50 shadow-lg">
                        <button onClick={() => setAba('preparo')} className={`flex-1 py-4 ${aba==='preparo'?'bg-indigo-900 border-b-4 border-yellow-400':''}`}>1. Planejar</button>
                        <button onClick={() => setAba('compras')} className={`flex-1 py-4 ${aba==='compras'?'bg-indigo-900 border-b-4 border-yellow-400':''}`}>2. Mercado</button>
                        <button onClick={() => setAba('editar')} className={`flex-1 py-4 ${aba==='editar'?'bg-indigo-900 border-b-4 border-yellow-400':''}`}>3. Banco</button>
                    </nav>

                    <main className="p-4 flex-1 overflow-y-auto">
                        {aba === 'preparo' && (
                            <div className="space-y-4">
                                <div className="bg-slate-100 p-4 rounded-2xl border">
                                    <input value={busca} onChange={e => setBusca(e.target.value)} placeholder="🔍 Digite o produto..." className="w-full p-3 rounded-lg border-none outline-none font-bold mb-2 shadow-sm" />
                                    {sugestoes.map(s => (
                                        <div key={s.id} onClick={() => {setBusca(s.nome);}} className="p-3 bg-white border rounded mb-1 text-xs flex justify-between cursor-pointer">
                                            <b>{s.nome}</b> <span className="opacity-40">{s.cat}</span>
                                        </div>
                                    ))}
                                    <div className="flex gap-2">
                                        <input value={qtd} onChange={e => setQtd(e.target.value)} placeholder="Qtd" className="w-20 p-2 rounded-lg outline-none font-bold" />
                                        <input value={obs} onChange={e => setObs(e.target.value)} placeholder="Obs..." className="flex-1 p-2 rounded-lg outline-none italic text-xs" />
                                    </div>
                                    <button onClick={() => add(busca, "Geral")} className="w-full mt-3 bg-indigo-600 text-white font-bold py-3 rounded-xl uppercase text-[10px]">Adicionar</button>
                                </div>
                                {Object.entries(listaCompra).map(([id, item]) => (
                                    <div key={id} className="p-3 border-b flex justify-between items-center text-xs">
                                        <span><b>{item.nome}</b> ({item.qtd})</span>
                                        <button onClick={() => db.ref(`compra_atual/${id}`).remove()} className="text-red-400 px-2">✕</button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {aba === 'compras' && (
                            <div className="space-y-4 pb-20">
                                {Object.values(listaCompra).map(item => {
                                    const id = btoa(unescape(encodeURIComponent(item.nome))).replace(/=/g, "");
                                    return (
                                        <div key={id} onClick={() => db.ref(`compra_atual/${id}`).update({comprado: !item.comprado})} className={`p-4 rounded-xl border flex justify-between items-center ${item.comprado ? 'bg-gray-100 opacity-40' : 'bg-white shadow'}`}>
                                            <span className={`font-bold ${item.comprado ? 'line-through' : ''}`}>{item.nome} ({item.qtd})</span>
                                            <span>{item.comprado ? '✅' : '⬜'}</span>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {aba === 'editar' && (
                            <div className="space-y-4">
                                <input value={filtroEdit} onChange={e => setFiltroEdit(e.target.value)} placeholder="🔍 Filtrar no banco..." className="w-full p-3 border-2 rounded-lg outline-none font-bold" />
                                {inventario.filter(i => i.nome.toLowerCase().includes(filtroEdit.toLowerCase())).slice(0, 10).map(item => (
                                    <div key={item.id} className="p-3 bg-white border rounded-xl flex flex-col gap-2">
                                        <div className="flex gap-2">
                                            <input defaultValue={item.nome} onBlur={e => db.ref(`inventario_mestre/${item.id}`).update({nome: e.target.value})} className="flex-1 font-bold p-1 bg-gray-50 rounded" />
                                            <button onClick={() => confirm("Excluir?") && db.ref(`inventario_mestre/${item.id}`).remove()} className="text-red-400">✕</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
