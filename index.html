<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - Lista da Casa</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-6 font-sans">
    
    <div id="login-screen" class="max-w-md w-full bg-slate-800 p-8 rounded-[2.5rem] shadow-2xl border border-slate-700 text-center">
        <h1 class="text-3xl font-black text-white mb-2 uppercase italic tracking-tighter">Protegido</h1>
        <p class="text-slate-400 text-xs font-bold mb-6 uppercase tracking-widest">Digite a chave de acesso</p>
        
        <input type="password" id="pass-input" placeholder="••••" class="w-full p-4 rounded-2xl bg-slate-900 text-white text-center text-2xl tracking-[1em] border border-slate-700 outline-none mb-4 focus:border-indigo-500">
        
        <button onclick="checkPass()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-black uppercase text-sm shadow-lg active:scale-95 transition-all">Entrar</button>
        <p id="error" class="text-red-500 text-[10px] mt-4 font-bold uppercase hidden">Chave incorreta</p>
    </div>

    <div id="menu-screen" class="max-w-md w-full space-y-4 hidden">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-black text-white uppercase tracking-tighter italic">Lista da Casa</h1>
            <p class="text-indigo-400 text-xs font-bold uppercase tracking-widest">Painel de Controle</p>
        </header>

        <div class="grid gap-4">
            <a href="planejar.html" class="bg-indigo-600 text-white p-6 rounded-[2rem] shadow-xl flex items-center justify-between transition-transform active:scale-95">
                <div><span class="block text-2xl">📝</span><span class="font-black uppercase text-sm">1. Planejar</span></div>
                <span class="opacity-50">→</span>
            </a>
            <a href="mercado.html" class="bg-white text-indigo-900 p-6 rounded-[2rem] shadow-lg flex items-center justify-between transition-transform active:scale-95">
                <div><span class="block text-2xl">🛒</span><span class="font-black uppercase text-sm">2. Mercado</span></div>
                <span class="text-indigo-200">→</span>
            </a>
            <a href="banco.html" class="bg-slate-700 text-white p-6 rounded-[2rem] shadow-xl flex items-center justify-between transition-transform active:scale-95 border border-slate-600">
                <div><span class="block text-2xl">⚙️</span><span class="font-black uppercase text-sm">3. Banco</span></div>
                <span class="opacity-30">→</span>
            </a>
        </div>
        
        <button onclick="logout()" class="w-full text-slate-500 text-[10px] font-bold uppercase tracking-widest mt-8">Sair do Sistema</button>
    </div>

    <script>
        const MINHA_SENHA = "casa123"; // ALTERE AQUI SUA SENHA

        function checkPass() {
            const val = document.getElementById('pass-input').value;
            if(val === MINHA_SENHA) {
                localStorage.setItem('acesso_lista', 'autorizado');
                showMenu();
            } else {
                document.getElementById('error').classList.remove('hidden');
                document.getElementById('pass-input').value = '';
            }
        }

        function showMenu() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('menu-screen').classList.remove('hidden');
            document.body.classList.replace('bg-slate-900', 'bg-slate-100');
        }

        function logout() {
            localStorage.removeItem('acesso_lista');
            location.reload();
        }

        // Verifica se já estava logado antes
        if(localStorage.getItem('acesso_lista') === 'autorizado') {
            showMenu();
        }
    </script>
</body>
</html>
