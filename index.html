            "Hortifruti": ["Abobrinha", "Acelga", "Alface", "Alho", "Alho Poró", "Batata", "Batata Doce", "Berinjela", "Beterraba", "Brócolis", "Broto de Feijão", "Cabotiá", "Cebola", "Cebola Roxa", "Cebolinha", "Cenoura", "Cheiro Verde", "Chicória", "Chuchu", "Couve Flor", "Couve", "Espinafre", "Gengibre", "Hortelã", "Mandioca", "Mandioca Palito Congelada", "Mandioquinha", "Mini cebola", "Pepino japonês", "Pimenta do Reino", "Pimentões", "Quiabo", "Repolho", "Rúcula", "Salsão", "Salsinha", "Tomate", "Tomate Cereja", "Tomate Seco", "Vagem"],
            "Frutas": ["Abacaxi", "Ameixa", "Banana", "Goiaba", "Kiwi", "Laranja", "Limão", "Limão Siciliano", "Maçã", "Maçã verde", "Mamão", "Manga", "Maracujá", "Melancia", "Melão", "Morango", "Pêra", "Pêssego", "Uva Verde"],
            "Carnes": ["Bacon em pedaço", "Bacon em tiras", "Bisteca Suína", "Brócolis congelado", "Carne Assada", "Carne Bovina (Lagarto)", "Carne Moída", "Carne para Bife", "Carne para Estrogonofe", "Carne para Panela", "Carne Seca Dianteiro", "Copa Lombo Grelhado", "Costela", "Costelinha Suína", "Cupim", "Filé de Peito de Frango", "Filé de Peixe", "Filé Mignon Suíno", "Linguiça Calabresa", "Linguiça Calabresa Fininha", "Linguiça de Paio", "Linguiça Toscana", "Lombo de Porco Salgado", "Paio", "Peito de Frango", "Pernil Suíno sem osso", "Rabada", "Salmão", "Sobrecoxa de Frango", "coxão mole", "Torresmo"],
            "Frios": ["Anel de Cebola", "Hamburguer", "Iogurte", "Manteiga", "Mortadela", "Nuggets de Frango", "Pão de Queijo", "Pizza", "Presunto fatiado", "Queijo Meia Cura", "Queijo Minas Frescal", "Queijo Mussarela Fatiado", "Requeijão", "Sorvete", "Suco Natural", "Alho Descascado", "Banha", "Batata Frita", "Calabresa", "Catupiry", "Couve-Flor congelada", "Creme de Leite Fresco", "Massa de Pastel", "Nata", "Nhoque", "Parmesão Defumado", "Queijo Mussarela (peça)", "Rondelli", "Ovos (Cartela)"]
        };

        function App() {
            const [aba, setAba] = useState('preparo');
            const [listaCompra, setListaCompra] = useState({});
            const [busca, setBusca] = useState('');

            useEffect(() => {
                const ref = db.ref('compra_atual');
                ref.on('value', (snapshot) => setListaCompra(snapshot.val() || {}));
                return () => ref.off();
            }, []);

            const toggleItem = (nome, cat) => {
                const id = btoa(unescape(encodeURIComponent(nome))).replace(/=/g, "");
                if (listaCompra[id]) {
                    db.ref(`compra_atual/${id}`).remove();
                } else {
                    db.ref(`compra_atual/${id}`).set({ nome, cat, qtd: 1, comprado: false });
                }
            };

            const mudarQtd = (id, n) => {
                const novaQtd = Math.max(1, (listaCompra[id].qtd || 1) + n);
                db.ref(`compra_atual/${id}`).update({ qtd: novaQtd });
            };

            const toggleComprado = (id) => {
                db.ref(`compra_atual/${id}`).update({ comprado: !listaCompra[id].comprado });
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white shadow-xl flex flex-col">
                    <header className="bg-indigo-700 text-white p-6 text-center shadow-md">
                        <h1 className="text-xl font-black uppercase tracking-widest">Lista da Casa</h1>
                    </header>

                    <nav className="flex bg-indigo-600 text-white font-bold text-xs">
                        <button onClick={() => setAba('preparo')} className={`flex-1 py-4 transition ${aba==='preparo'?'bg-indigo-800 border-b-4 border-yellow-400':''}`}>PLANEJAR</button>
                        <button onClick={() => setAba('compras')} className={`flex-1 py-4 transition ${aba==='compras'?'bg-indigo-800 border-b-4 border-yellow-400':''}`}>NO MERCADO</button>
                    </nav>

                    <main className="flex-1 p-4 overflow-y-auto">
                        {aba === 'preparo' ? (
                            <div>
                                <input placeholder="🔍 Buscar item..." className="w-full p-4 rounded-xl mb-6 bg-slate-100 border-none outline-none" onChange={e => setBusca(e.target.value)} />
                                {Object.keys(LISTA_MUITO_LONGA).map(cat => (
                                    <div key={cat} className="mb-6">
                                        <h3 className="text-indigo-500 font-bold text-xs uppercase mb-2 ml-1">{cat}</h3>
                                        {LISTA_MUITO_LONGA[cat].filter(i => i.toLowerCase().includes(busca.toLowerCase())).map(item => {
                                            const id = btoa(unescape(encodeURIComponent(item))).replace(/=/g, "");
                                            const selecionado = !!listaCompra[id];
                                            return (
                                                <div key={item} className={`flex items-center justify-between p-3 rounded-xl mb-1 border transition ${selecionado ? 'bg-indigo-50 border-indigo-200' : 'bg-white border-slate-100'}`}>
                                                    <label className="flex items-center gap-3 flex-1 cursor-pointer">
                                                        <input type="checkbox" checked={selecionado} onChange={() => toggleItem(item, cat)} className="w-5 h-5 accent-indigo-600" />
                                                        <span className={selecionado ? "font-bold text-indigo-900" : "text-slate-600"}>{item}</span>
                                                    </label>
                                                    {selecionado && (
                                                        <div className="flex items-center gap-2 bg-white px-2 py-1 rounded-lg border shadow-sm font-bold">
                                                            <button onClick={() => mudarQtd(id, -1)} className="px-2 text-indigo-600">-</button>
                                                            <span className="text-xs">{listaCompra[id].qtd}</span>
                                                            <button onClick={() => mudarQtd(id, 1)} className="px-2 text-indigo-600">+</button>
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="space-y-3">
                                {Object.keys(listaCompra).length === 0 && <p className="text-center text-slate-400 mt-20 italic">Sua lista está vazia.</p>}
                                {Object.entries(listaCompra).sort((a,b) => a[1].cat.localeCompare(b[1].cat)).map(([id, item]) => (
                                    <div key={id} onClick={() => toggleComprado(id)} className={`p-4 rounded-2xl border-2 flex justify-between items-center transition ${item.comprado ? 'bg-slate-50 border-transparent opacity-50 grayscale' : 'bg-white border-white shadow-lg active:scale-95'}`}>
                                        <div className="flex gap-4 items-center">
                                            <div className="text-2xl">{item.comprado ? '✅' : '⬜'}</div>
                                            <div>
                                                <span className="text-[10px] font-bold text-indigo-500 uppercase">{item.cat}</span>
                                                <p className={`text-lg font-bold leading-none ${item.comprado ? 'line-through text-slate-400' : ''}`}>{item.nome}</p>
                                            </div>
                                        </div>
                                        <div className="bg-indigo-700 text-white px-3 py-1 rounded-lg font-black shadow-md">
                                            <span className="block text-[8px] opacity-70 uppercase leading-none mb-1 text-center">Qtd</span>
                                            <div className="text-lg leading-none">{item.qtd}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
