            "Geral": ["Açúcar Cristal", "Açúcar Refinado", "Açúcar Mascavo", "Alcaparra", "Alecrim", "Alho Frito", "Ameixa Seca", "Amêndoa Natural sem sal crua", "Amendoim", "Amido de Milho", "Arroz", "Azeite Vidro Verde", "Azeite Vidro Vermelho", "Azeitona sem caroço Inteira", "Azeitona sem caroço Picada", "Batata Palha", "Bolacha de Champagne", "Bolacha de Maisena", "Café Gourmet", "Canela em Pó", "Canjica", "Castanha de caju sem sal crua", "Cesta PADRE LUIZ", "Champignon", "Chocolate 100% Cacau", "Chocolate em pó 50 Melk", "Chocolate Branco", "Chocolate do padre", "Chocolate Granulado", "Chocolate Meio Amargo Barra", "Coco ralado", "Copo Plástico", "Creme de Cebola", "Creme de Leite", "Cuscuz de milho", "Cuscuz Marroquino", "Ervas Finas (Erva Doce)", "Ervilha", "Essência de Baunilha", "Extrato de Tomate Elefante", "Fardo de Refri", "Farinha de Mandioca Deusa", "Farinha de Milho", "Farinha de Rosca", "Farinha de Trigo", "Farinha Panko", "Feijão", "Feijão Branco", "Feijão Preto", "Fermento Biológico", "Fermento Pó-Royal", "Fubá", "Gelatina", "Gengibre em Pó", "Goiabada", "Grão de Bico", "Insulfime", "Leite Condensado", "Leite de Coco", "Louro", "Macarrão espaguete", "Macarrão parafuso", "Maionese normal", "Maionese Temperada", "Manjericão Seco", "Massa de Lasanha (Pré Cozida)", "Milho de Lata", "Molho de Tomate", "Molho Shoio", "Óleo de soja", "Orégano", "Ovos de codorna", "Ovos de codorna (Bandeja)", "Palmito de pupunha", "Papel Alumínio", "Papel Manteiga", "Papel Toalha", "Pessego em lata", "Pimenta do Reino", "Proteína de Soja", "Queijo Ralado", "Rap10", "Saco de Lixo grande 50 litros", "Saco de Lixo grande 100 litros", "Sal", "Sal Grosso", "Saquinhos", "Sardinha lata", "Suco de Saquinho de Limão", "Tapioca", "Tempero Baiano", "Tempero do Chef", "Tomilho", "Torradas", "Trigo para Quibe", "Uva Passa", "Vinagre", "Salsa seca", "Cebola em pó", "Vinho suave"],
            "Diversos": ["Acendedor de Carvão", "Adaptador de Tomada", "Água Sanitária", "Alcool", "Álcool Spray", "Alicate", "Amaciante", "Amassador de Alho", "Ardósia", "Band Aid", "Bisnaga de Molhos", "Bombril", "Borrifador", "Bucha de Louça", "Camiseta de Uniforme", "Carvão", "Chocotone", "Chuveiro 220", "CIF Cremoso", "CIF derrete gordura", "Colher de Madeira", "Descascador de Legumes", "Desengordurante", "Desinfetante", "Detergente", "Diabo Verde", "Doce de Abóbora", "Doce de Batata", "Doce de Leite", "Durex", "Escova de Limpeza", "Escova de Privada", "Espátula de Silicone", "Esponja de louça", "Ferro de Passar", "Fita Adesiva", "Fita Isolante", "Forma de Gelo", "Forma de Hamburguer", "Frigideira", "Gancho", "Guardanapo de Pano", "Inseticida SBP", "Lâmpada", "Lixeira 50 litros", "Lustra móveis", "Luva de Limpeza", "Luva de Louça", "Mata Barata", "Panetone", "Pano de Chão", "Pano de Pia", "Pão Duro", "Papel Higiênico", "Papel Sulfite", "Pasta de Dente", "Pasta Lavar Panela", "Pastilha Piscina", "Pato (para privada)", "Pilha", "Pincel de Silicone", "Ponta da Mangueira", "Porta papel toalha", "Pote para detergente", "Querosene", "Ração", "Ralo de Pia", "Resistência", "Rodo e Vassoura", "Sabão em Pó", "Sabonete", "Sabonete Líquido", "Saco de Lixo", "Saleiro", "Sanito (para refeitório)", "Saquinho de Hamburguer", "Soda Cáustica", "Taça de Sobremesa", "Teta de Nega", "Torneira", "Touca (Cozinha)", "Vanish", "Vanish em barra para Roupa Colorida", "Veja Limpeza Pesada", "Veneno de Formiga em Gel", "Zap Clean Refil", "Bom air", "Desodorante"],
            "Hortifruti": ["Abobrinha", "Acelga", "Alface", "Alho", "Alho Poró", "Batata", "Batata Doce", "Berinjela", "Beterraba", "Brócolis", "Broto de Feijão", "Cabotiá", "Cebola", "Cebola Roxa", "Cebolinha", "Cenoura", "Cheiro Verde", "Chicória", "Chuchu", "Couve Flor", "Couve", "Espinafre", "Gengibre", "Hortelã", "Mandioca", "Mandioca Palito Congelada", "Mandioquinha", "Mini cebola", "Pepino japonês", "Pimenta do Reino", "Pimentões", "Quiabo", "Repolho", "Rúcula", "Salsão", "Salsinha", "Tomate", "Tomate Cereja", "Tomate Seco", "Vagem"],
            "Frutas": ["Abacaxi", "Ameixa", "Banana", "Goiaba", "Kiwi", "Laranja", "Limão", "Limão Siciliano", "Maçã", "Maçã verde", "Mamão", "Manga", "Maracujá", "Melancia", "Melão", "Morango", "Pêra", "Pêssego", "Uva Verde"],
            "Carnes": ["Bacon em pedaço", "Bacon em tiras", "Bisteca Suína", "Brócolis congelado", "Carne Assada", "Carne Bovina (Lagarto)", "Carne Moída", "Carne para Bife", "Carne para Estrogonofe", "Carne para Panela", "Carne Seca Dianteiro", "Copa Lombo Grelhado", "Costela", "Costelinha Suína", "Cupim", "Filé de Peito de Frango", "Filé de Peixe", "Filé Mignon Suíno", "Linguiça Calabresa", "Linguiça Calabresa Fininha", "Linguiça de Paio", "Linguiça Toscana", "Lombo de Porco Salgado", "Paio", "Peito de Frango", "Pernil Suíno sem osso", "Rabada", "Salmão", "Sobrecoxa de Frango", "coxão mole", "Torresmo"],
            "Frios": ["Anel de Cebola", "Hamburguer", "Iogurte", "Manteiga", "Mortadela", "Nuggets de Frango", "Pão de Queijo", "Pizza", "Presunto fatiado", "Queijo Meia Cura", "Queijo Minas Frescal", "Queijo Mussarela Fatiado", "Requeijão", "Sorvete", "Suco Natural", "Alho Descascado", "Banha", "Batata Frita", "Calabresa", "Catupiry", "Couve-Flor congelada", "Creme de Leite Fresco", "Massa de Pastel", "Nata", "Nhoque", "Parmesão Defumado", "Queijo Mussarela (peça)", "Rondelli", "Ovos (Cartela)"]
        };

        const FLAT_LIST = Object.entries(LISTA_MUITO_LONGA).flatMap(([cat, itens]) => itens.map(nome => ({nome, cat})));

        function App() {
            const [aba, setAba] = useState('preparo');
            const [listaCompra, setListaCompra] = useState({});
            const [inputBusca, setInputBusca] = useState('');
            const [inputQtd, setInputQtd] = useState(1);
            const [sugestoes, setSugestoes] = useState([]);
            const qtdRef = useRef(null);

            useEffect(() => {
                const ref = db.ref('compra_atual');
                ref.on('value', (snapshot) => setListaCompra(snapshot.val() || {}));
                return () => ref.off();
            }, []);

            const handleBusca = (val) => {
                setInputBusca(val);
                if (val.length > 1) {
                    const filtered = FLAT_LIST.filter(i => i.nome.toLowerCase().includes(val.toLowerCase())).slice(0, 5);
                    setSugestoes(filtered);
                } else {
                    setSugestoes([]);
                }
            };

            const selecionarItem = (item) => {
                setInputBusca(item.nome);
                setSugestoes([]);
                qtdRef.current?.focus();
            };

            const adicionarItemFinal = () => {
                const itemEncontrado = FLAT_LIST.find(i => i.nome.toLowerCase() === inputBusca.toLowerCase());
                if (itemEncontrado) {
                    const id = btoa(unescape(encodeURIComponent(itemEncontrado.nome))).replace(/=/g, "");
                    db.ref(`compra_atual/${id}`).set({ 
                        nome: itemEncontrado.nome, 
                        cat: itemEncontrado.cat, 
                        qtd: parseInt(inputQtd) || 1, 
                        comprado: false 
                    });
                    setInputBusca('');
                    setInputQtd(1);
                }
            };

            const exportarPDF = () => {
                const doc = new jsPDF();
                const data = new Date().toLocaleDateString();
                
                doc.setFontSize(18);
                doc.text("Lista de Compras da Casa", 20, 20);
                doc.setFontSize(10);
                doc.text(`Data: ${data}`, 20, 28);
                
                let y = 40;
                const categorias = [...new Set(Object.values(listaCompra).map(i => i.cat))];
                
                categorias.forEach(cat => {
                    doc.setFont("helvetica", "bold");
                    doc.text(cat.toUpperCase(), 20, y);
                    y += 7;
                    doc.setFont("helvetica", "normal");
                    
                    Object.values(listaCompra).filter(i => i.cat === cat).forEach(item => {
                        doc.text(`[ ] ${item.nome} (Qtd: ${item.qtd})`, 25, y);
                        y += 6;
                        if (y > 280) { doc.addPage(); y = 20; }
                    });
                    y += 5;
                });
                
                doc.save(`lista-compras-${data}.pdf`);
            };

            const limparLista = () => {
                if (window.confirm("Deseja zerar toda a lista de compras?")) {
                    db.ref('compra_atual').remove();
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white shadow-xl flex flex-col">
                    <header className="bg-indigo-700 text-white p-6 text-center shadow-md flex justify-between items-center">
                        <h1 className="text-xl font-black uppercase tracking-widest">Lista da Casa</h1>
                    </header>

                    <nav className="flex bg-indigo-600 text-white font-bold text-xs sticky top-0 z-20">
                        <button onClick={() => setAba('preparo')} className={`flex-1 py-4 ${aba==='preparo'?'bg-indigo-900 border-b-4 border-yellow-400':''}`}>PLANEJAR</button>
                        <button onClick={() => setAba('compras')} className={`flex-1 py-4 ${aba==='compras'?'bg-indigo-900 border-b-4 border-yellow-400':''}`}>NO MERCADO</button>
                    </nav>

                    <main className="flex-1 p-4 overflow-y-auto">
                        {aba === 'preparo' && (
                            <div className="space-y-4">
                                <div className="relative bg-indigo-50 p-4 rounded-2xl border border-indigo-100">
                                    <h3 className="text-[10px] font-bold text-indigo-400 uppercase mb-2">Adicionar Item</h3>
                                    <div className="flex gap-2">
                                        <div className="relative flex-1">
                                            <input 
                                                value={inputBusca} 
                                                onChange={(e) => handleBusca(e.target.value)}
                                                placeholder="Nome..." 
                                                className="w-full p-3 rounded-lg border-none text-sm outline-none shadow-sm"
                                            />
                                            {sugestoes.length > 0 && (
                                                <div className="absolute top-full left-0 right-0 bg-white shadow-xl rounded-b-lg z-30 border border-slate-200">
                                                    {sugestoes.map(s => (
                                                        <div key={s.nome} onClick={() => selecionarItem(s)} className="p-3 hover:bg-indigo-50 cursor-pointer border-b text-sm last:border-0">
                                                            <span className="font-bold">{s.nome}</span> <span className="text-[10px] text-slate-400 uppercase">({s.cat})</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                        <input 
                                            ref={qtdRef}
                                            type="number" 
                                            value={inputQtd} 
                                            onChange={e => setInputQtd(e.target.value)}
                                            onKeyDown={e => e.key === 'Enter' && adicionarItemFinal()}
                                            className="w-16 p-3 rounded-lg border-none text-center font-bold outline-none shadow-sm"
                                        />
                                        <button onClick={adicionarItemFinal} className="bg-indigo-600 text-white px-4 rounded-lg font-bold shadow-md">+</button>
                                    </div>
                                </div>

                                <div className="mt-8">
                                    <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Itens Selecionados:</h3>
                                    {Object.entries(listaCompra).map(([id, item]) => (
                                        <div key={id} className="flex justify-between items-center p-3 bg-white border border-slate-100 rounded-xl mb-2 shadow-sm">
                                            <div className="flex flex-col">
                                                <span className="text-[10px] font-bold text-indigo-400 uppercase">{item.cat}</span>
                                                <span className="font-bold text-slate-700">{item.nome}</span>
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <span className="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full font-black text-xs">x{item.qtd}</span>
                                                <button onClick={() => db.ref(`compra_atual/${id}`).remove()} className="text-red-400 font-bold px-2">✕</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {aba === 'compras' && (
                            <div className="space-y-3 pb-24">
                                <div className="flex justify-between items-center bg-indigo-50 p-4 rounded-2xl border border-indigo-100 mb-4">
                                    <div className="flex gap-2">
                                        <button onClick={exportarPDF} className="text-[10px] bg-indigo-600 text-white px-3 py-1 rounded-full font-bold uppercase tracking-tighter">Exportar PDF</button>
                                        <button onClick={limparLista} className="text-[10px] bg-red-100 text-red-600 px-3 py-1 rounded-full font-bold uppercase tracking-tighter">Limpar</button>
                                    </div>
                                    <span className="text-xs font-black text-indigo-900 uppercase">Lista Mercado</span>
                                </div>
                                
                                {Object.entries(listaCompra).sort((a,b) => a[1].cat.localeCompare(b[1].cat)).map(([id, item]) => (
                                    <div key={id} onClick={() => db.ref(`compra_atual/${id}`).update({comprado: !item.comprado})} className={`p-4 rounded-2xl border-2 flex justify-between items-center transition-all ${item.comprado ? 'bg-slate-50 border-transparent opacity-50' : 'bg-white border-white shadow-lg active:scale-95'}`}>
                                        <div className="flex gap-4 items-center text-left">
                                            <div className="text-2xl">{item.comprado ? '✅' : '⬜'}</div>
                                            <div>
                                                <span className="text-[8px] font-bold text-indigo-500 uppercase">{item.cat}</span>
                                                <p className={`text-lg font-bold leading-none ${item.comprado ? 'line-through text-slate-400' : ''}`}>{item.nome}</p>
                                            </div>
                                        </div>
                                        <div className="bg-indigo-700 text-white px-3 py-1 rounded-lg font-black shadow-md">
                                            <span className="block text-[8px] opacity-70 uppercase leading-none mb-1 text-center font-bold italic">Qtd</span>
                                            <div className="text-lg leading-none">{item.qtd}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
