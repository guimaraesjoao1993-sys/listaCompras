<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lista da Casa PRO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyD4jdw3dkSl-63iyBypdip4NXUah2mdie8",
            authDomain: "rag-final-474711.firebaseapp.com",
            databaseURL: "https://rag-final-474711-default-rtdb.firebaseio.com",
            projectId: "rag-final-474711",
            storageBucket: "rag-final-474711.firebasestorage.app",
            messagingSenderId: "281529599553",
            appId: "1:281529599553:web:2e466ab204c1dc7210a8c0"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function App() {
            const [aba, setAba] = useState('preparo');
            const [listaCompra, setListaCompra] = useState({});
            const [inventario, setInventario] = useState([]);
            const [busca, setBusca] = useState("");
            const [qtd, setQtd] = useState("");
            const [obs, setObs] = useState("");
            const [filtroEdit, setFiltroEdit] = useState("");

            useEffect(() => {
                db.ref('inventario_mestre').on('value', snap => {
                    const val = snap.val() || {};
                    setInventario(Object.entries(val).map(([id, v]) => ({ id, ...v })));
                });
                db.ref('compra_atual').on('value', snap => setListaCompra(snap.val() || {}));
            }, []);

            // OTIMIZAÇÃO: Filtra apenas o necessário para não travar o celular
            const sugestoes = useMemo(() => {
                if (!busca || busca.length < 2) return [];
                return inventario
                    .filter(i => i.nome.toLowerCase().includes(busca.toLowerCase()))
                    .slice(0, 5);
            }, [busca, inventario]);

            const listaFiltradaEdit = useMemo(() => {
                if (!filtroEdit) return inventario.slice(0, 10);
                return inventario
                    .filter(i => i.nome.toLowerCase().includes(filtroEdit.toLowerCase()))
                    .slice(0, 20);
            }, [filtroEdit, inventario]);

            const handleAdd = (itemNome, itemCat) => {
                const id = btoa(unescape(encodeURIComponent(itemNome))).replace(/=/g, "");
                db.ref(`compra_atual/${id}`).set({
                    nome: itemNome, cat: itemCat || "Geral", qtd: qtd || "1", obs: obs || "", comprado: false
                }).then(() => { setBusca(""); setQtd(""); setObs(""); });
            };

            const itensAgrupados = Object.values(listaCompra).reduce((acc, item) => {
                if (!acc[item.cat]) acc[item.cat] = [];
                acc[item.cat].push(item);
                return acc;
            }, {});

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white flex flex-col shadow-2xl pb-20">
                    <nav className="flex bg-indigo-700 text-white font-bold text-[10px] uppercase sticky top-0 z-50 shadow-md">
                        <button onClick={() => setAba('preparo')} className={`flex-1 py-4 ${aba==='preparo'?'bg-indigo-900 border-b-4 border-yellow-400':''}`}>Planejar</button>
                        <button onClick={() => setAba('compras')} className={`flex-1 py-4 ${aba==='compras'?'bg-indigo-900 border-b-4 border-yellow-400':''}`}>Mercado</button>
                        <button onClick={() => setAba('editar')} className={`flex-1 py-4 ${aba==='editar'?'bg-indigo-900 border-b-4 border-yellow-400':''}`}>Banco</button>
                    </nav>

                    <main className="p-4 flex-1 overflow-y-auto">
                        {aba === 'preparo' && (
                            <div className="space-y-4">
                                <div className="bg-slate-100 p-4 rounded-3xl border border-indigo-100">
                                    <input value={busca} onChange={e => setBusca(e.target.value)} placeholder="🔍 Nome do produto..." className="w-full p-3 rounded-xl mb-2 outline-none font-bold shadow-sm" />
                                    {sugestoes.map(s => (
                                        <div key={s.id} onClick={() => { setBusca(s.nome); setAddCat(s.cat); }} className="p-3 bg-white mb-1 rounded border text-xs flex justify-between cursor-pointer active:bg-indigo-100">
                                            <span className="font-bold">{s.nome}</span> <span className="opacity-50 uppercase text-[9px]">{s.cat}</span>
                                        </div>
                                    ))}
                                    <div className="flex gap-2">
                                        <input value={qtd} onChange={e => setQtd(e.target.value)} placeholder="Qtd" className="w-20 p-2 rounded-lg outline-none font-bold" />
                                        <input value={obs} onChange={e => setObs(e.target.value)} placeholder="Observação..." className="flex-1 p-2 rounded-lg outline-none italic text-xs" />
                                    </div>
                                    <button onClick={() => handleAdd(busca, "Geral")} className="w-full mt-3 bg-indigo-600 text-white font-bold py-3 rounded-xl uppercase text-[10px] shadow-md">Adicionar à Lista</button>
                                </div>
                                <div className="space-y-2">
                                    {Object.entries(listaCompra).map(([id, item]) => (
                                        <div key={id} className="p-3 bg-white border-b flex justify-between items-center">
                                            <div>
                                                <p className="font-bold text-gray-800 text-xs uppercase">{item.nome} ({item.qtd})</p>
                                                {item.obs && <p className="text-[10px] text-indigo-500 italic">{item.obs}</p>}
                                            </div>
                                            <button onClick={() => db.ref(`compra_atual/${id}`).remove()} className="text-red-400 p-2">✕</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {aba === 'compras' && (
                            <div className="space-y-6">
                                <button onClick={() => confirm("Zerar lista?") && db.ref('compra_atual').remove()} className="w-full bg-red-50 text-red-600 p-2 rounded-xl text-[10px] font-black uppercase">Limpar Lista</button>
                                {Object.keys(itensAgrupados).sort().map(cat => (
                                    <div key={cat} className="space-y-2">
                                        <h3 className="text-[10px] font-black text-indigo-400 uppercase text-center border-b pb-1">{cat}</h3>
                                        {itensAgrupados[cat].map(item => (
                                            <div key={item.nome} onClick={() => {
                                                const id = btoa(unescape(encodeURIComponent(item.nome))).replace(/=/g, "");
                                                db.ref(`compra_atual/${id}`).update({comprado: !item.comprado});
                                            }} className={`p-4 rounded-xl flex justify-between items-center ${item.comprado ? 'bg-gray-50 opacity-40' : 'bg-white shadow border'}`}>
                                                <div className="flex gap-4 items-center">
                                                    <div className="text-xl">{item.comprado ? '✅' : '⬜'}</div>
                                                    <div>
                                                        <span className={`text-base font-bold ${item.comprado ? 'line-through text-gray-400' : 'text-gray-800'}`}>{item.nome}</span>
                                                        {item.obs && !item.comprado && <p className="text-[10px] text-indigo-500">{item.obs}</p>}
                                                    </div>
                                                </div>
                                                <div className="bg-indigo-700 text-white px-2 py-1 rounded font-bold text-[10px]">{item.qtd}</div>
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>
                        )}

                        {aba === 'editar' && (
                            <div className="space-y-4">
                                <input value={filtroEdit} onChange={e => setFiltroEdit(e.target.value)} placeholder="🔍 Pesquisar produto no banco..." className="w-full p-3 rounded-lg border-2 outline-none font-bold shadow-sm" />
                                <div className="space-y-2">
                                    {listaFiltradaEdit.map(item => (
                                        <div key={item.id} className="p-3 bg-white border rounded-xl shadow-sm">
                                            <div className="flex justify-between items-center mb-2">
                                                <input defaultValue={item.nome} onBlur={e => db.ref(`inventario_mestre/${item.id}`).update({nome: e.target.value})} className="font-bold text-sm bg-gray-50 p-1 rounded flex-1 mr-2" />
                                                <button onClick={() => confirm("Excluir?") && db.ref(`inventario_mestre/${item.id}`).remove()} className="text-red-400">✕</button>
                                            </div>
                                            <select defaultValue={item.cat} onChange={e => db.ref(`inventario_mestre/${item.id}`).update({cat: e.target.value})} className="text-[10px] uppercase font-bold text-gray-400 bg-gray-100 p-1 rounded w-full">
                                                <option value="Geral">Geral</option><option value="Seminaristas">Seminaristas</option><option value="Hortifruti">Hortifruti</option><option value="Carnes">Carnes</option><option value="Diversos">Diversos</option><option value="Frios">Frios</option><option value="Frutas">Frutas</option>
                                            </select>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
