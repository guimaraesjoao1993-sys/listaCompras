            "Geral": ["Açúcar Cristal", "Açúcar Refinado", "Açúcar Mascavo", "Alcaparra", "Alecrim", "Alho Frito", "Ameixa Seca", "Amêndoa Natural", "Amendoim", "Amido de Milho", "Arroz", "Azeite Vidro Verde", "Azeite Vidro Vermelho", "Azeitona sem caroço Inteira", "Azeitona sem caroço Picada", "Batata Palha", "Bolacha de Champagne", "Bolacha de Maisena", "Café Gourmet", "Canela em Pó", "Canjica", "Castanha de caju", "Champignon", "Chocolate 100% Cacau", "Chocolate em pó 50 Melk", "Chocolate Branco", "Chocolate do padre", "Chocolate Granulado", "Chocolate Meio Amargo Barra", "Coco ralado", "Copo Plástico", "Creme de Cebola", "Creme de Leite", "Cuscuz de milho", "Cuscuz Marroquino", "Ervas Finas", "Ervilha", "Essência de Baunilha", "Extrato de Tomate", "Fardo de Refri", "Farinha de Mandioca", "Farinha de Milho", "Farinha de Rosca", "Farinha de Trigo", "Farinha Panko", "Feijão", "Feijão Branco", "Feijão Preto", "Fermento Biológico", "Fermento Pó-Royal", "Fubá", "Gelatina", "Gengibre em Pó", "Goiabada", "Grão de Bico", "Insulfime", "Leite Condensado", "Leite de Coco", "Louro", "Macarrão espaguete", "Macarrão parafuso", "Maionese normal", "Maionese Temperada", "Manjericão Seco", "Massa de Lasanha", "Milho de Lata", "Molho de Tomate", "Molho Shoio", "Óleo de soja", "Orégano", "Ovos de codorna", "Palmito de pupunha", "Papel Alumínio", "Papel Manteiga", "Papel Toalha", "Pessego em lata", "Pimenta do Reino", "Proteína de Soja", "Queijo Ralado", "Rap10", "Saco de Lixo", "Sal", "Sal Grosso", "Saquinhos", "Sardinha lata", "Tapioca", "Tempero Baiano", "Tempero do Chef", "Tomilho", "Torradas", "Trigo para Quibe", "Uva Passa", "Vinagre", "Salsa seca", "Cebola em pó", "Vinho suave"],
            "Diversos": ["Acendedor de Carvão", "Adaptador de Tomada", "Água Sanitária", "Alcool", "Álcool Spray", "Alicate", "Amaciante", "Amassador de Alho", "Ardósia", "Band Aid", "Bombril", "Borrifador", "Bucha de Louça", "Camiseta de Uniforme", "Carvão", "Chocotone", "Chuveiro 220", "CIF Cremoso", "CIF derrete gordura", "Colher de Madeira", "Descascador de Legumes", "Desengordurante", "Desinfetante", "Detergente", "Diabo Verde", "Doce de Abóbora", "Doce de Batata", "Doce de Leite", "Durex", "Escova de Limpeza", "Escova de Privada", "Espátula de Silicone", "Ferro de Passar", "Fita Adesiva", "Fita Isolante", "Forma de Gelo", "Forma de Hamburguer", "Frigideira", "Gancho", "Guardanapo de Pano", "Inseticida SBP", "Lâmpada", "Lixeira 50 litros", "Lustra móveis", "Luva de Limpeza", "Mata Barata", "Panetone", "Pano de Chão", "Pano de Pia", "Pão Duro", "Papel Higiênico", "Papel Sulfite", "Pasta de Dente", "Pasta Lavar Panela", "Pastilha Piscina", "Pato", "Pilha", "Pincel de Silicone", "Ponta da Mangueira", "Porta papel toalha", "Pote para detergente", "Querosene", "Ração", "Ralo de Pia", "Resistência", "Rodo e Vassoura", "Sabão em Pó", "Sabonete", "Sabonete Líquido", "Saco de Lixo", "Saleiro", "Sanito", "Saquinho de Hamburguer", "Soda Cáustica", "Taça de Sobremesa", "Teta de Nega", "Torneira", "Touca", "Vanish", "Veja Limpeza Pesada", "Veneno de Formiga", "Zap Clean Refil", "Bom air", "Desodorante"],
            "Hortifruti": ["Abobrinha", "Acelga", "Alface", "Alho", "Alho Poró", "Batata", "Batata Doce", "Berinjela", "Beterraba", "Brócolis", "Broto de Feijão", "Cabotiá", "Cebola", "Cebola Roxa", "Cebolinha", "Cenoura", "Cheiro Verde", "Chicória", "Chuchu", "Couve Flor", "Couve", "Espinafre", "Gengibre", "Hortelã", "Mandioca", "Mandioquinha", "Mini cebola", "Pepino japonês", "Pimentões", "Quiabo", "Repolho", "Rúcula", "Salsão", "Salsinha", "Tomate", "Tomate Cereja", "Tomate Seco", "Vagem"],
            "Frutas": ["Abacaxi", "Ameixa", "Banana", "Goiaba", "Kiwi", "Laranja", "Limão", "Limão Siciliano", "Maçã", "Maçã verde", "Mamão", "Manga", "Maracujá", "Melancia", "Melão", "Morango", "Pêra", "Pêssego", "Uva Verde"],
            "Carnes": ["Bacon", "Bisteca Suína", "Carne Assada", "Carne Bovina", "Carne Moída", "Carne para Bife", "Carne para Estrogonofe", "Carne para Panela", "Carne Seca", "Costela", "Costelinha Suína", "Cupim", "Filé de Peito", "Filé de Peixe", "Filé Mignon Suíno", "Linguiça Calabresa", "Linguiça de Paio", "Linguiça Toscana", "Lombo de Porco", "Peito de Frango", "Pernil Suíno", "Rabada", "Salmão", "Sobrecoxa", "coxão mole", "Torresmo"],
            "Frios": ["Anel de Cebola", "Hamburguer", "Iogurte", "Manteiga", "Mortadela", "Nuggets", "Pão de Queijo", "Pizza", "Presunto fatiado", "Queijo Meia Cura", "Queijo Minas Frescal", "Queijo Mussarela", "Requeijão", "Sorvete", "Suco Natural", "Banha", "Batata Frita", "Catupiry", "Massa de Pastel", "Nata", "Nhoque", "Ovos"]
        };

        function App() {
            const [aba, setAba] = useState('preparo');
            const [listaCompra, setListaCompra] = useState({});
            const [inventario, setInventario] = useState([]);
            const [status, setStatus] = useState("Iniciando...");
            const [busca, setBusca] = useState("");
            const [sugestoes, setSugestoes] = useState([]);
            const [qtd, setQtd] = useState("");
            const [novaCatInput, setNovaCatInput] = useState('');
            const [novoProdNome, setNovoProdNome] = useState('');
            const [novoProdCat, setNovoProdCat] = useState('Geral');
            const [categorias, setCategorias] = useState([]);
            const qtdRef = useRef();

            useEffect(() => {
                db.ref(".info/connected").on("value", snap => setStatus(snap.val() ? "ON ✅" : "OFF ❌"));
                db.ref('inventario_mestre').on('value', snap => {
                    const data = snap.val() || {};
                    setInventario(Object.entries(data).map(([id, v]) => ({ id, ...v })));
                });
                db.ref('compra_atual').on('value', snap => setListaCompra(snap.val() || {}));
                db.ref('categorias').on('value', snap => setCategorias(snap.val() || []));
            }, []);

            const carregarTudoMestre = () => {
                setStatus("Gravando...");
                const batch = {};
                const cats = Object.keys(LISTA_INTEGRAL);
                db.ref('categorias').set(cats);
                Object.entries(LISTA_INTEGRAL).forEach(([cat, itens]) => {
                    itens.forEach(nome => {
                        const id = btoa(unescape(encodeURIComponent(nome))).replace(/=/g, "");
                        batch[id] = { nome, cat };
                    });
                });
                db.ref('inventario_mestre').update(batch)
                    .then(() => alert("Todos os 200+ itens foram carregados!"))
                    .catch(err => alert("Erro: " + err.message));
            };

            const add = () => {
                const item = inventario.find(i => i.nome.toLowerCase() === busca.toLowerCase());
                if(item) {
                    db.ref(`compra_atual/${item.id}`).set({ ...item, qtd: qtd || "1", comprado: false });
                    setBusca(""); setQtd(""); setSugestoes([]);
                }
            };

            const exportarPDF = () => {
                const doc = new jsPDF();
                doc.text("LISTA DE COMPRAS", 20, 20);
                let y = 30;
                Object.values(listaCompra).forEach(i => {
                    doc.text(`[ ] ${i.nome} (${i.qtd}) - ${i.cat}`, 20, y);
                    y += 8;
                    if (y > 280) { doc.addPage(); y = 20; }
                });
                doc.save("lista.pdf");
            };

            const itensAgrupados = Object.values(listaCompra).reduce((acc, item) => {
                if (!acc[item.cat]) acc[item.cat] = [];
                acc[item.cat].push(item);
                return acc;
            }, {});

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 flex flex-col shadow-2xl pb-20">
                    <div className="bg-indigo-900 text-[9px] text-white p-1 text-center font-bold tracking-widest uppercase italic border-b border-indigo-700">
                        Sincronização: {status} | Banco: {inventario.length} itens
                    </div>
                    
                    <nav className="flex bg-indigo-700 text-white font-black text-[10px] uppercase sticky top-0 z-50 shadow-lg">
                        <button onClick={() => setAba('preparo')} className={`flex-1 py-4 ${aba==='preparo'?'bg-indigo-950 border-b-4 border-yellow-400':''}`}>Planejar</button>
                        <button onClick={() => setAba('compras')} className={`flex-1 py-4 ${aba==='compras'?'bg-indigo-950 border-b-4 border-yellow-400':''}`}>Mercado</button>
                        <button onClick={() => setAba('config')} className={`flex-1 py-4 ${aba==='config'?'bg-indigo-950 border-b-4 border-yellow-400':''}`}>⚙️ Itens</button>
                    </nav>

                    <main className="p-4 overflow-y-auto">
                        {aba === 'config' && (
                            <div className="space-y-6">
                                <button onClick={carregarTudoMestre} className="w-full bg-orange-500 text-white p-5 rounded-3xl font-black shadow-xl active:scale-95 transition">CARREGAR LISTA COMPLETA (200+)</button>
                                
                                <section className="bg-white p-4 rounded-3xl shadow-sm border">
                                    <h3 className="text-[10px] font-black text-indigo-500 uppercase mb-3 px-1">Novo Produto Mestre</h3>
                                    <input value={novoProdNome} onChange={e => setNovoProdNome(e.target.value)} placeholder="Nome..." className="w-full p-3 bg-slate-100 rounded-xl mb-2 outline-none text-sm" />
                                    <div className="flex gap-2">
                                        <select value={novoProdCat} onChange={e => setNovoProdCat(e.target.value)} className="flex-1 p-2 bg-slate-100 rounded-lg text-xs uppercase font-bold">
                                            {categorias.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                        <button onClick={() => {
                                            const id = btoa(unescape(encodeURIComponent(novoProdNome))).replace(/=/g, "");
                                            db.ref(`inventario_mestre/${id}`).set({nome: novoProdNome, cat: novoProdCat});
                                            setNovoProdNome('');
                                        }} className="bg-indigo-600 text-white px-6 rounded-xl font-bold">Add</button>
                                    </div>
                                </section>
                                
                                <section className="bg-white p-4 rounded-3xl shadow-sm border">
                                    <h3 className="text-[10px] font-black text-indigo-500 uppercase mb-3 px-1">Nova Categoria</h3>
                                    <div className="flex gap-2">
                                        <input value={novaCatInput} onChange={e => setNovaCatInput(e.target.value)} placeholder="Ex: Limpeza" className="flex-1 p-3 bg-slate-100 rounded-xl outline-none text-sm" />
                                        <button onClick={() => {
                                            db.ref('categorias').set([...categorias, novaCatInput]);
                                            setNovaCatInput('');
                                        }} className="bg-indigo-600 text-white px-4 rounded-xl font-bold">+</button>
                                    </div>
                                </section>
                            </div>
                        )}

                        {aba === 'preparo' && (
                            <div className="space-y-4">
                                <div className="bg-indigo-700 p-5 rounded-[2.5rem] shadow-2xl">
                                    <input 
                                        value={busca} 
                                        onChange={e => {
                                            setBusca(e.target.value);
                                            setSugestoes(e.target.value.length > 0 ? inventario.filter(i => i.nome.toLowerCase().includes(e.target.value.toLowerCase())).slice(0, 5) : []);
                                        }} 
                                        placeholder="🔍 Buscar produto..." 
                                        className="w-full p-4 rounded-2xl mb-2 outline-none border-none text-slate-800 font-bold" 
                                    />
                                    {sugestoes.length > 0 && (
                                        <div className="bg-white rounded-2xl mb-2 shadow-2xl overflow-hidden">
                                            {sugestoes.map(s => (
                                                <div key={s.id} onClick={() => {setBusca(s.nome); setSugestoes([]); qtdRef.current.focus();}} className="p-4 border-b last:border-0 text-sm font-black flex justify-between active:bg-indigo-100 cursor-pointer">
                                                    <span>{s.nome}</span>
                                                    <span className="text-[9px] bg-slate-100 px-2 py-1 rounded text-slate-400 uppercase">{s.cat}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                    <div className="flex gap-2">
                                        <input ref={qtdRef} value={qtd} onChange={e => setQtd(e.target.value)} onKeyDown={e => e.key==='Enter' && add()} placeholder="Qtd (un, kg, L...)" className="flex-1 p-4 rounded-2xl outline-none text-center font-black" />
                                        <button onClick={add} className="bg-yellow-400 text-indigo-900 px-8 rounded-2xl font-black uppercase text-xs shadow-md">ADICIONAR</button>
                                    </div>
                                </div>
                                <div className="space-y-2 mt-6">
                                    {Object.entries(listaCompra).map(([id, item]) => (
                                        <div key={id} className="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-indigo-500 flex justify-between items-center">
                                            <span className="font-bold text-slate-700 uppercase tracking-tighter text-sm">{item.nome} <span className="text-indigo-500 ml-2">({item.qtd})</span></span>
                                            <button onClick={() => db.ref(`compra_atual/${id}`).remove()} className="text-red-400 font-bold p-2 text-xl">✕</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {aba === 'compras' && (
                            <div className="space-y-6">
                                <div className="flex gap-2 sticky top-2 z-10 p-1">
                                    <button onClick={exportarPDF} className="flex-1 bg-white border-2 border-indigo-100 text-indigo-700 p-3 rounded-2xl text-[10px] font-black uppercase shadow-lg">Exportar PDF</button>
                                    <button onClick={() => window.confirm("Zerar?") && db.ref('compra_atual').remove()} className="flex-1 bg-red-100 text-red-600 p-3 rounded-2xl text-[10px] font-black uppercase shadow-sm">Zerar Lista</button>
                                </div>
                                {Object.keys(itensAgrupados).sort().map(cat => (
                                    <div key={cat} className="space-y-2">
                                        <h3 className="text-[10px] font-black text-indigo-300 uppercase text-center tracking-[0.3em] py-2">{cat}</h3>
                                        {itensAgrupados[cat].map(item => {
                                            const itemId = btoa(unescape(encodeURIComponent(item.nome))).replace(/=/g, "");
                                            return (
                                                <div key={itemId} onClick={() => db.ref(`compra_atual/${itemId}`).update({comprado: !item.comprado})} 
                                                     className={`p-5 rounded-[2rem] flex justify-between items-center transition-all ${item.comprado ? 'bg-slate-100 opacity-40 grayscale scale-95 shadow-none' : 'bg-white shadow-xl border-2 border-white'}`}>
                                                    <div className="flex gap-4 items-center">
                                                        <div className="text-3xl">{item.comprado ? '✅' : '⬜'}</div>
                                                        <span className={`text-xl font-black tracking-tight ${item.comprado ? 'line-through text-slate-400' : 'text-slate-800'}`}>{item.nome}</span>
                                                    </div>
                                                    <div className="bg-indigo-700 text-white px-4 py-2 rounded-2xl font-black text-xs shadow-md">{item.qtd}</div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
