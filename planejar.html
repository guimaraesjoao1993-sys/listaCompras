<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1. Planejar (Modo Sobrevivência)</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-indigo-50 p-4 pb-24">
    <div class="max-w-md mx-auto">
        <div class="bg-white p-6 rounded-[2rem] shadow-2xl border-2 border-indigo-200">
            <h2 class="text-center font-black uppercase text-indigo-900 mb-4 tracking-tighter">O que vamos comprar?</h2>
            
            <input type="text" id="busca" oninput="filtrar()" placeholder="Pesquisar produto..." class="w-full p-4 rounded-xl bg-slate-100 font-bold outline-none border-2 border-transparent focus:border-indigo-500">
            
            <div id="sugestoes" class="mt-1 space-y-1 max-h-60 overflow-y-auto"></div>
            
            <div class="flex gap-2 mt-3">
                <input type="text" id="qtd" placeholder="Qtd" class="w-20 p-3 rounded-xl border-2 border-slate-100 font-bold outline-none">
                <input type="text" id="obs" placeholder="Obs/Marca..." class="flex-1 p-3 rounded-xl border-2 border-slate-100 italic text-sm outline-none">
            </div>

            <button onclick="add(document.getElementById('busca').value)" class="w-full mt-4 bg-indigo-600 text-white font-black py-4 rounded-2xl uppercase shadow-lg active:bg-indigo-800 transition-all">
                Adicionar na Marra 🚀
            </button>
            <p class="text-[9px] text-center mt-2 text-slate-400 font-bold uppercase">Se não achar na busca, digite acima e clique no botão</p>
        </div>

        <div id="lista" class="mt-8 space-y-2"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD4jdw3dkSl-63iyBypdip4NXUah2mdie8",
            authDomain: "rag-final-474711.firebaseapp.com",
            databaseURL: "https://rag-final-474711-default-rtdb.firebaseio.com",
            projectId: "rag-final-474711",
            storageBucket: "rag-final-474711.firebasestorage.app",
            messagingSenderId: "281529599553",
            appId: "1:281529599553:web:2e466ab204c1dc7210a8c0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let mestre = [];

        function limpar(s) { return s ? s.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "") : ""; }

        // MODO SOBREVIVÊNCIA: Força a leitura de qualquer formato
        db.ref('inventario_mestre').on('value', s => {
            const raw = s.val() || {};
            mestre = [];
            Object.keys(raw).forEach(key => {
                const item = raw[key];
                if (typeof item === 'object') {
                    mestre.push({ id: key, nome: item.nome || "Sem Nome", cat: item.cat || "Geral" });
                } else {
                    mestre.push({ id: key, nome: item, cat: "Geral" });
                }
            });
        });

        db.ref('compra_atual').on('value', s => {
            const val = s.val() || {};
            const container = document.getElementById('lista');
            container.innerHTML = '';
            Object.entries(val).forEach(([id, item]) => {
                const d = document.createElement('div');
                d.className = "p-4 bg-white rounded-2xl shadow flex justify-between items-center border-l-4 border-indigo-500 mb-2";
                d.innerHTML = `<div><b class="text-xs uppercase">${item.nome} (${item.qtd})</b><p class="text-[10px] text-indigo-400 italic">${item.obs || ''}</p></div>
                               <button onclick="db.ref('compra_atual/${id}').remove()" class="text-red-300 font-bold p-2">✕</button>`;
                container.appendChild(d);
            });
        });

        function filtrar() {
            const t = limpar(document.getElementById('busca').value);
            const b = document.getElementById('sugestoes');
            b.innerHTML = '';
            if(t.length < 1) return;

            mestre.filter(i => limpar(i.nome).includes(t)).slice(0, 8).forEach(s => {
                const d = document.createElement('div');
                d.className = "p-4 bg-white border-b-2 border-indigo-50 text-sm font-bold flex justify-between cursor-pointer active:bg-indigo-50";
                d.innerHTML = `${s.nome} <span class="text-[9px] opacity-30 uppercase">${s.cat}</span>`;
                d.onclick = () => { add(s.nome, s.cat); b.innerHTML = ''; };
                b.appendChild(d);
            });
        }

        function add(nome, catInput) {
            if(!nome) return;
            const id = btoa(unescape(encodeURIComponent(nome))).replace(/=/g, "");
            db.ref('compra_atual/' + id).set({
                nome: nome,
                qtd: document.getElementById('qtd').value || "1",
                obs: document.getElementById('obs').value || "",
                cat: catInput || "Geral",
                comprado: false
            });
            document.getElementById('busca').value = '';
            document.getElementById('qtd').value = '';
            document.getElementById('obs').value = '';
        }
    </script>
</body>
</html>
