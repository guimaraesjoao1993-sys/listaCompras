<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1. Planejar Compra</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-indigo-50 p-4 pb-24 font-sans">
    <div class="max-w-md mx-auto space-y-4">
        <div class="flex justify-between items-center">
            <a href="index.html" class="text-indigo-400 font-bold text-[10px] uppercase">← Painel</a>
            <div id="status" class="text-[9px] font-bold text-indigo-300 uppercase">Carregando Banco...</div>
        </div>
        
        <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border-2 border-indigo-100">
            <input type="text" id="busca" oninput="filtrar()" placeholder="🔍 O que falta? (ex: arroz)" class="w-full p-4 rounded-2xl mb-2 font-bold bg-slate-100 outline-none border-2 border-transparent focus:border-indigo-500">
            
            <div id="sugestoes" class="space-y-1 mb-2 max-h-48 overflow-y-auto"></div>
            
            <div class="flex gap-2">
                <input type="text" id="qtd" placeholder="Qtd" class="w-20 p-3 rounded-xl border bg-slate-50 font-bold outline-none">
                <input type="text" id="obs" placeholder="Obs..." class="flex-1 p-3 rounded-xl border bg-slate-50 italic text-sm outline-none">
            </div>
            
            <button id="btn-salvar" onclick="salvarNoFirebase()" class="w-full mt-4 bg-indigo-600 text-white font-black py-4 rounded-2xl uppercase shadow-lg active:scale-95 transition-all">
                Adicionar à Lista 🚀
            </button>
        </div>

        <div id="lista" class="space-y-2 pt-4"></div>
    </div>

    <script>
        // Verificação de acesso
        if(localStorage.getItem('acesso_lista') !== 'autorizado') {
            window.location.href = "index.html";
        }

        const firebaseConfig = {
            apiKey: "AIzaSyD4jdw3dkSl-63iyBypdip4NXUah2mdie8",
            authDomain: "rag-final-474711.firebaseapp.com",
            databaseURL: "https://rag-final-474711-default-rtdb.firebaseio.com",
            projectId: "rag-final-474711",
            storageBucket: "rag-final-474711.firebasestorage.app",
            messagingSenderId: "281529599553",
            appId: "1:281529599553:web:2e466ab204c1dc7210a8c0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let mestre = [];
        let categoriaSelecionada = "Geral";

        // Função de normalização (essencial para a busca funcionar)
        function limpar(str) {
            return str ? str.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "") : "";
        }

        // CARREGAR BANCO MESTRE (Otimizado)
        db.ref('inventario_mestre').on('value', s => {
            const val = s.val() || {};
            mestre = Object.entries(val).map(([id, v]) => {
                if (typeof v === 'object') {
                    return { id, nome: v.nome, cat: v.cat || "Geral" };
                }
                return { id, nome: v, cat: "Geral" };
            });
            document.getElementById('status').innerText = mestre.length + " ITENS DISPONÍVEIS";
        });

        // RENDERIZAR LISTA ATUAL
        db.ref('compra_atual').on('value', s => {
            const val = s.val() || {};
            const container = document.getElementById('lista');
            container.innerHTML = '<h3 class="text-[10px] font-black text-slate-400 uppercase ml-4 mb-2">Na lista agora:</h3>';
            
            const itens = Object.entries(val).sort((a,b) => b[1].timestamp - a[1].timestamp);

            itens.forEach(([id, item]) => {
                const d = document.createElement('div');
                d.className = "p-4 bg-white rounded-2xl shadow-sm flex justify-between items-center border-l-8 border-indigo-400 mb-2 active:bg-indigo-50";
                d.innerHTML = `
                    <div onclick="prepararEdicao('${id}', '${item.nome.replace(/'/g, "\\'")}', '${item.qtd}', '${item.obs.replace(/'/g, "\\'")}', '${item.cat}')" class="flex-1 cursor-pointer">
                        <b class="text-xs uppercase">${item.nome} (${item.qtd})</b>
                        <p class="text-[10px] text-indigo-400 italic">${item.obs || ''}</p>
                    </div>
                    <button onclick="db.ref('compra_atual/${id}').remove()" class="text-red-300 font-bold p-2 text-xl">✕</button>`;
                container.appendChild(d);
            });
        });

        // FILTRO DE BUSCA (Corrigido)
        function filtrar() {
            const t = limpar(document.getElementById('busca').value);
            const box = document.getElementById('sugestoes');
            box.innerHTML = '';
            
            if(t.length < 1) return;

            const filtrados = mestre.filter(i => limpar(i.nome).includes(t)).slice(0, 6);

            filtrados.forEach(s => {
                const d = document.createElement('div');
                d.className = "p-4 bg-white border-b border-indigo-50 text-sm font-bold flex justify-between cursor-pointer active:bg-indigo-100";
                d.innerHTML = `<span>${s.nome}</span> <span class="opacity-30 uppercase text-[9px]">${s.cat}</span>`;
                d.onclick = () => { 
                    document.getElementById('busca').value = s.nome; 
                    categoriaSelecionada = s.cat;
                    box.innerHTML = ''; 
                    document.getElementById('qtd').focus(); 
                };
                box.appendChild(d);
            });
        }

        function prepararEdicao(id, nome, qtd, obs, cat) {
            document.getElementById('busca').value = nome;
            document.getElementById('qtd').value = qtd;
            document.getElementById('obs').value = obs;
            categoriaSelecionada = cat;
            
            const btn = document.getElementById('btn-salvar');
            btn.innerText = "Atualizar Item ✍️";
            btn.setAttribute('data-id', id);
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function salvarNoFirebase() {
            const nomeInput = document.getElementById('busca').value;
            const qtdInput = document.getElementById('qtd').value || "1";
            const obsInput = document.getElementById('obs').value || "";
            const btn = document.getElementById('btn-salvar');
            const idEdicao = btn.getAttribute('data-id');
            
            if(!nomeInput) return;

            const id = idEdicao || "item_" + Date.now();
            
            db.ref('compra_atual/' + id).set({
                nome: nomeInput,
                qtd: qtdInput,
                obs: obsInput,
                cat: categoriaSelecionada,
                comprado: false,
                timestamp: Date.now()
            }).then(() => {
                document.getElementById('busca').value = '';
                document.getElementById('qtd').value = '';
                document.getElementById('obs').value = '';
                btn.innerText = "Adicionar à Lista 🚀";
                btn.removeAttribute('data-id');
                categoriaSelecionada = "Geral";
            });
        }
    </script>
</body>
</html>
