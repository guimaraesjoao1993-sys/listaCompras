<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3. Gestão de Estoque PRO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 p-4 text-white pb-20 font-sans">
    <div class="max-w-md mx-auto space-y-6">
        <header class="flex justify-between items-center no-print">
            <a href="index.html" class="text-indigo-400 font-bold text-[10px] uppercase">← Painel</a>
            <h1 class="font-black uppercase italic text-xl tracking-tighter">Gestão Master</h1>
        </header>

        <div class="bg-slate-800 p-4 rounded-3xl border border-slate-700 shadow-xl space-y-3">
            <div>
                <label class="text-[9px] font-black uppercase text-indigo-400 ml-2">Filtrar por Categoria</label>
                <select id="filtro-categoria" onchange="renderProdutos()" class="w-full bg-slate-900 p-3 rounded-xl border border-slate-700 text-sm font-bold outline-none mt-1">
                    <option value="TODAS">📦 Mostrar Todas as Categorias</option>
                </select>
            </div>
            <div>
                <label class="text-[9px] font-black uppercase text-indigo-400 ml-2">Buscar Nome</label>
                <input type="text" id="filtro-nome" oninput="renderProdutos()" placeholder="🔍 Ex: Arroz..." class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 outline-none font-bold text-sm">
            </div>
        </div>

        <div id="status-contagem" class="text-[10px] text-center font-bold text-slate-500 uppercase"></div>
        <div id="container-produtos" class="space-y-3"></div>
    </div>

    <script>
        if(localStorage.getItem('acesso_lista') !== 'autorizado') {
            window.location.href = "index.html";
        }

        const firebaseConfig = {
            apiKey: "AIzaSyD4jdw3dkSl-63iyBypdip4NXUah2mdie8",
            authDomain: "rag-final-474711.firebaseapp.com",
            databaseURL: "https://rag-final-474711-default-rtdb.firebaseio.com",
            projectId: "rag-final-474711",
            storageBucket: "rag-final-474711.firebasestorage.app",
            messagingSenderId: "281529599553",
            appId: "1:281529599553:web:2e466ab204c1dc7210a8c0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let produtos = [];
        let categorias = [];

        function limpar(s) { return s ? s.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "") : ""; }

        // Sincronizar Categorias para o Select
        db.ref('categorias').on('value', s => {
            const val = s.val() || {};
            categorias = Object.values(val).sort();
            const select = document.getElementById('filtro-categoria');
            const valorAtual = select.value;
            
            select.innerHTML = '<option value="TODAS">📦 Mostrar Todas as Categorias</option>';
            categorias.forEach(c => {
                select.innerHTML += `<option value="${c}">${c}</option>`;
            });
            select.value = valorAtual || "TODAS";
        });

        // Sincronizar Produtos
        db.ref('inventario_mestre').on('value', s => {
            const raw = s.val() || {};
            produtos = Object.entries(raw).map(([id, v]) => ({
                id, 
                nome: typeof v === 'object' ? v.nome : v, 
                cat: v.cat || "Geral"
            }));
            renderProdutos();
        });

        function renderProdutos() {
            const categoriaFiltro = document.getElementById('filtro-categoria').value;
            const nomeFiltro = limpar(document.getElementById('filtro-nome').value);
            const box = document.getElementById('container-produtos');
            box.innerHTML = '';
            
            // Filtragem
            let filtrados = produtos.filter(p => {
                const bateNome = limpar(p.nome).includes(nomeFiltro);
                const bateCat = categoriaFiltro === "TODAS" || p.cat === categoriaFiltro;
                return bateNome && bateCat;
            });

            // Ordenação Alfabética Total
            filtrados.sort((a, b) => a.nome.localeCompare(b.nome));

            document.getElementById('status-contagem').innerText = `${filtrados.length} produtos exibidos`;

            if (filtrados.length === 0) {
                box.innerHTML = '<p class="text-center py-10 text-slate-600 uppercase font-bold text-xs">Nenhum item encontrado</p>';
                return;
            }

            filtrados.forEach(p => {
                const div = document.createElement('div');
                div.className = "bg-slate-800 p-3 rounded-2xl border border-slate-700 shadow-sm flex flex-col gap-2";
                div.innerHTML = `
                    <div class="flex gap-2">
                        <input type="text" value="${p.nome}" 
                            onblur="db.ref('inventario_mestre/${p.id}').update({nome: this.value})" 
                            class="flex-1 bg-slate-900 p-2 rounded-lg text-sm font-bold border-none outline-none focus:ring-1 ring-indigo-500">
                        <button onclick="if(confirm('Excluir permanentemente?')) db.ref('inventario_mestre/${p.id}').remove()" class="text-red-500 px-2 font-bold">✕</button>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-[8px] font-black text-slate-500 uppercase ml-1">Cat:</span>
                        <select onchange="db.ref('inventario_mestre/${p.id}').update({cat: this.value})" 
                            class="flex-1 bg-slate-700 p-1.5 rounded-lg text-[10px] font-black uppercase text-slate-200 outline-none">
                            ${categorias.map(c => `<option value="${c}" ${p.cat === c ? 'selected' : ''}>${c}</option>`).join('')}
                        </select>
                    </div>
                `;
                box.appendChild(div);
            });
        }
    </script>
</body>
</html>
