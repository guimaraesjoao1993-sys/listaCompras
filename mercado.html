<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2. Mercado - Versão Definitiva</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .bg-gray-100 { background: #f3f4f6 !important; border: 1px solid #ccc; }
        }
        .category-content { transition: max-height 0.3s ease-out; overflow: hidden; }
        .collapsed { max-height: 0 !important; }
    </style>
</head>
<body class="bg-gray-100 p-4 pb-20 font-sans">
    <div class="max-w-md mx-auto space-y-4">
        
        <div class="flex justify-between items-center no-print">
            <a href="index.html" class="text-indigo-600 font-bold text-[10px] uppercase">← Painel</a>
            <h1 class="font-black text-gray-800 uppercase text-lg italic tracking-tighter">No Mercado</h1>
        </div>

        <div class="flex gap-2 no-print">
            <button onclick="window.print()" class="flex-1 bg-slate-800 text-white p-3 rounded-xl text-[10px] font-bold uppercase shadow-lg active:scale-95 transition-all">🖨️ Imprimir</button>
            <button onclick="confirmarZerar()" class="flex-1 bg-red-100 text-red-600 p-3 rounded-xl text-[10px] font-bold uppercase active:scale-95 transition-all">🗑️ Zerar Lista</button>
        </div>

        <div id="contador-geral" class="text-[10px] text-slate-400 font-bold uppercase text-center no-print">Carregando itens...</div>

        <div id="container" class="space-y-6 pt-2"></div>
    </div>

    <script>
        if(localStorage.getItem('acesso_lista') !== 'autorizado') {
            window.location.href = "index.html";
        }

        const firebaseConfig = {
            apiKey: "AIzaSyD4jdw3dkSl-63iyBypdip4NXUah2mdie8",
            authDomain: "rag-final-474711.firebaseapp.com",
            databaseURL: "https://rag-final-474711-default-rtdb.firebaseio.com",
            projectId: "rag-final-474711",
            storageBucket: "rag-final-474711.firebasestorage.app",
            messagingSenderId: "281529599553",
            appId: "1:281529599553:web:2e466ab204c1dc7210a8c0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const SENHA_PARA_ZERAR = "1234"; 
        const categoriasRecolhidas = JSON.parse(localStorage.getItem('cats_recolhidas') || "{}");

        function confirmarZerar() {
            const tentativa = prompt("Para APAGAR toda a lista, digite a senha:");
            if (tentativa === SENHA_PARA_ZERAR) {
                if (confirm("TEM CERTEZA?")) db.ref('compra_atual').remove();
            } else if (tentativa !== null) {
                alert("Senha incorreta!");
            }
        }

        function toggleCategoria(catNome) {
            categoriasRecolhidas[catNome] = !categoriasRecolhidas[catNome];
            localStorage.setItem('cats_recolhidas', JSON.stringify(categoriasRecolhidas));
            // A própria re-renderização será disparada pelo Firebase instantaneamente
        }

        // Sincronização e Renderização 100% Real-Time e Blindada
        db.ref('compra_atual').on('value', s => {
            const val = s.val() || {};
            const box = document.getElementById('container');
            box.innerHTML = '';
            
            // Conversão ultra segura para evitar quebra com dados corrompidos ou antigos
            const itens = Object.entries(val).map(([id, data]) => {
                if (typeof data !== 'object' || data === null) {
                    return { id, nome: String(data), cat: "Geral", comprado: false, qtd: "1", obs: "" };
                }
                return {
                    id,
                    nome: data.nome ? String(data.nome) : "Sem Nome",
                    cat: data.cat ? String(data.cat).trim() : "Geral",
                    comprado: !!data.comprado,
                    qtd: data.qtd || "1",
                    obs: data.obs || ""
                };
            });

            // Atualiza o contador de auditoria do topo
            const totalFalta = itens.filter(i => !i.comprado).length;
            document.getElementById('contador-geral').innerText = `${totalFalta} restantes de ${itens.length} itens na lista`;

            if (itens.length === 0) {
                box.innerHTML = '<div class="text-center py-20 text-slate-400 font-bold uppercase text-xs">A lista está vazia</div>';
                return;
            }

            // Ordenação: Itens comprados vão para o fim da lista, os ativos ficam em Ordem Alfabética
            itens.sort((a, b) => {
                if (a.comprado !== b.comprado) return a.comprado - b.comprado;
                return a.nome.localeCompare(b.nome);
            });

            // Agrupamento por Categorias
            const categoriasAgrupadas = {};
            itens.forEach(i => {
                const c = i.cat === "" ? "Geral" : i.cat;
                if(!categoriasAgrupadas[c]) categoriasAgrupadas[c] = [];
                categoriasAgrupadas[c].push(i);
            });

            const listaCategoriasOrdenadas = Object.keys(categoriasAgrupadas).sort();

            // Renderização no HTML usando IDs Numéricos (Blindagem contra caracteres especiais)
            listaCategoriasOrdenadas.forEach((cat, index) => {
                const isCollapsed = !!categoriasRecolhidas[cat];
                const totalItensCat = categoriasAgrupadas[cat].length;
                const compradosCat = categoriasAgrupadas[cat].filter(i => i.comprado).length;
                const tudoPronto = totalItensCat === compradosCat;
                const uniqueContentId = `cat-block-${index}`;

                const sec = document.createElement('div');
                sec.className = "mb-4";
                
                // Monta o cabeçalho clicável da categoria
                sec.innerHTML = `
                    <div onclick="toggleCategoria('${cat.replace(/'/g, "\\'")}')" class="flex items-center justify-between bg-white/50 p-2 rounded-xl cursor-pointer border-b border-indigo-100 mb-2 no-print">
                        <span class="text-[10px] font-black ${tudoPronto ? 'text-emerald-500' : 'text-indigo-400'} uppercase tracking-widest">
                            ${cat} (${compradosCat}/${totalItensCat})
                        </span>
                        <span class="text-indigo-300 text-xs font-bold">
                            ${isCollapsed ? '➕' : '➖'}
                        </span>
                    </div>
                    <div class="hidden print:block border-b border-gray-400 pb-1 mb-2">
                        <span class="text-xs font-bold uppercase text-black">${cat}</span>
                    </div>
                    
                    <div id="${uniqueContentId}" class="category-content ${isCollapsed ? 'collapsed' : ''} space-y-2">
                    </div>
                `;

                box.appendChild(sec);
                const contentBox = document.getElementById(uniqueContentId);
                
                // Renderiza os produtos dentro de sua respectiva categoria
                categoriasAgrupadas[cat].forEach(item => {
                    const div = document.createElement('div');
                    div.className = `p-4 rounded-[1.5rem] flex justify-between items-center mb-2 transition-all cursor-pointer ${item.comprado ? 'bg-gray-200 opacity-50 grayscale scale-95 shadow-none print:hidden' : 'bg-white shadow-md border border-white'}`;
                    
                    div.onclick = (e) => {
                        e.stopPropagation();
                        db.ref('compra_atual/' + item.id).update({comprado: !item.comprado});
                    };
                    
                    div.innerHTML = `
                        <div class="flex gap-4 items-center">
                            <div class="text-xl print:hidden">${item.comprado ? '✅' : '⬜'}</div>
                            <div>
                                <b class="text-base ${item.comprado ? 'line-through text-gray-500' : 'text-gray-800'}">${item.nome}</b>
                                ${item.obs ? `<p class="text-[10px] text-indigo-500 italic font-medium print:text-gray-600">${item.obs}</p>` : ''}
                            </div>
                        </div>
                        <div class="bg-indigo-700 text-white px-3 py-1 rounded-xl font-bold text-xs print:bg-gray-200 print:text-black print:border">${item.qtd}</div>`;
                    contentBox.appendChild(div);
                });
            });
        });
    </script>
</body>
</html>
