<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2. Mercado</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .bg-gray-100 { background: #f3f4f6 !important; border: 1px solid #ccc; }
        }
    </style>
</head>
<body class="bg-gray-100 p-4 pb-20">
    <div class="max-w-md mx-auto space-y-4">
        <div class="flex justify-between items-center no-print">
            <a href="index.html" class="text-indigo-600 font-bold text-[10px] uppercase">← Painel</a>
            <h1 class="font-black text-gray-800 uppercase text-lg italic">No Mercado</h1>
        </div>

        <div class="flex gap-2 no-print">
            <button onclick="window.print()" class="flex-1 bg-slate-800 text-white p-3 rounded-xl text-[10px] font-bold uppercase shadow-lg">🖨️ Imprimir</button>
            <button onclick="if(confirm('Limpar lista?')) firebase.database().ref('compra_atual').remove()" class="flex-1 bg-red-100 text-red-600 p-3 rounded-xl text-[10px] font-bold uppercase">🗑️ Zerar</button>
        </div>

        <div id="container" class="space-y-6 pt-4"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD4jdw3dkSl-63iyBypdip4NXUah2mdie8",
            authDomain: "rag-final-474711.firebaseapp.com",
            databaseURL: "https://rag-final-474711-default-rtdb.firebaseio.com",
            projectId: "rag-final-474711",
            storageBucket: "rag-final-474711.firebasestorage.app",
            messagingSenderId: "281529599553",
            appId: "1:281529599553:web:2e466ab204c1dc7210a8c0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('compra_atual').on('value', s => {
            const val = s.val() || {};
            const box = document.getElementById('container');
            box.innerHTML = '';
            
            // Converte para array para permitir a ordenação
            const itens = Object.entries(val).map(([id, data]) => ({id, ...data}));

            // ORDENAÇÃO: Primeiro os NÃO comprados, depois os COMPRADOS
            itens.sort((a, b) => a.comprado - b.comprado);

            const categorias = {};
            itens.forEach(i => {
                if(!categorias[i.cat]) categorias[i.cat] = [];
                categorias[i.cat].push(i);
            });

            Object.keys(categorias).sort().forEach(cat => {
                const sec = document.createElement('div');
                sec.className = "mb-6";
                sec.innerHTML = `<h3 class="text-[10px] font-black text-indigo-400 uppercase text-center border-b pb-1 mb-3 tracking-widest">${cat}</h3>`;
                
                categorias[cat].forEach(item => {
                    const div = document.createElement('div');
                    div.className = `p-5 rounded-[2rem] flex justify-between items-center mb-2 transition-all cursor-pointer ${item.comprado ? 'bg-gray-200 opacity-50 grayscale' : 'bg-white shadow-lg border border-white'}`;
                    div.onclick = () => db.ref('compra_atual/' + item.id).update({comprado: !item.comprado});
                    div.innerHTML = `
                        <div class="flex gap-4 items-center">
                            <div class="text-2xl">${item.comprado ? '✅' : '⬜'}</div>
                            <div>
                                <b class="text-base ${item.comprado ? 'line-through text-gray-500' : 'text-gray-800'}">${item.nome}</b>
                                ${item.obs ? `<p class="text-[10px] text-indigo-500 italic font-medium">${item.obs}</p>` : ''}
                            </div>
                        </div>
                        <div class="bg-indigo-700 text-white px-3 py-1 rounded-xl font-bold text-xs">${item.qtd}</div>`;
                    sec.appendChild(div);
                });
                box.appendChild(sec);
            });
        });
    </script>
</body>
</html>
